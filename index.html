// ── PRODUCT AUTOCOMPLETE ──
let _acProdIdx = -1;

function onProdFocus() {
  if (!($('newline-inp')?.value || '').trim()) showRecentProds();
}

function _prodDropItem(p, i) {
  const cat = USER_CATS.find(c => c.name === p.categoria);
  const incLabel = cat ? (LINE_STRATEGIES[{regular:'standard',tiers:'tiers',dimensional:'dimensional',weight:'peso_vol',volume:'peso_vol',time:'standard'}[cat.incrementType]]?.label || 'Estándar') : 'Estándar';
  // onclick passes the stringified prod index — we retrieve from DATA on click
  return `<div class="ac-item" id="pi-${i}"
    onclick="addLine(DATA.productos.find(x=>x.id==='${p.id}'))"
    onmouseenter="_acProdIdx=${i};hiProdDrop()">
    <div style="flex:1;min-width:0">
      <div class="ac-item-name">${esc(p.nombre)}</div>
      <div class="ac-item-sub">${esc(p.categoria || 'sin categoría')} · ${incLabel}</div>
    </div>
    ${p.precio_base ? `<span class="ac-badge">$${fmtS(p.precio_base)}</span>` : '<span class="ac-badge" style="color:var(--amber)">sin precio</span>'}
  </div>`;
}

function showRecentProds() {
  const drop = $('prod-drop');
  const recent = DATA.productos.slice(0, 7);
  if (!recent.length) { drop.classList.remove('open'); return; }
  drop.innerHTML = recent.map((p, i) => _prodDropItem(p, i)).join('');
  drop._m = recent; drop._q = ''; drop.classList.add('open'); _acProdIdx = -1;
}

function onProdInput(val) {
  _acProdIdx = -1;
  const drop = $('prod-drop');
  if (!val.trim()) { showRecentProds(); return; }
  const q = val.trim().toLowerCase();
  const m = DATA.productos.filter(p => (p.nombre || '').toLowerCase().includes(q)).slice(0, 8);
  let html = m.length
    ? m.map((p, i) => _prodDropItem(p, i)).join('')
    : `<div class="ac-hint">Sin resultados — Enter para crear como nuevo</div>`;
  html += `<div class="ac-new" id="pi-new"
    onclick="createProdLine('${esc(val)}')"
    onmouseenter="_acProdIdx=${m.length};hiProdDrop()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="12" height="12">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
    Agregar <strong style="margin-left:2px">"${esc(val)}"</strong> como nuevo
  </div>`;
  drop.innerHTML = html; drop._m = m; drop._q = val; drop.classList.add('open');
}

function onProdKey(e) {
  const drop = $('prod-drop');
  const m = drop._m || [];
  if (e.key === 'ArrowDown') { e.preventDefault(); _acProdIdx = Math.min(_acProdIdx + 1, m.length); hiProdDrop(); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); _acProdIdx = Math.max(_acProdIdx - 1, -1); hiProdDrop(); }
  else if (e.key === 'Enter') {
    e.preventDefault();
    if (_acProdIdx >= 0 && _acProdIdx < m.length) addLine(m[_acProdIdx]);
    else if (_acProdIdx === m.length) createProdLine(drop._q || $('newline-inp').value);
    else if (m.length === 1) addLine(m[0]);
    else if (m.length === 0 && drop._q) createProdLine(drop._q);
  }
  else if (e.key === 'Tab') { if (m.length === 1) { e.preventDefault(); addLine(m[0]); } }
  else if (e.key === 'Escape') { drop.classList.remove('open'); _acProdIdx = -1; }
}

function hiProdDrop() {
  const drop = $('prod-drop');
  const m = drop._m || [];
  drop.querySelectorAll('.ac-item').forEach((el, i) => el.classList.toggle('hi', i === _acProdIdx));
  $('pi-new')?.classList.toggle('hi', _acProdIdx === m.length);
}
function addLine(prod) {
  // prod is a full product object from DATA.productos
  const line = LINE_FACTORY(prod);
  OF.lines.push(line);
  renderLinesList();
  refreshTotals();
  const inp = $('newline-inp');
  if (inp) { inp.value = ''; inp.focus(); }
  $('prod-drop').classList.remove('open');
  _acProdIdx = -1;
  // Focus the first meaningful input of the new line
  setTimeout(() => {
    const cards = document.querySelectorAll('.line-card');
    if (cards.length) {
      const last = cards[cards.length - 1];
      // For tiers: nothing to focus. For others: focus qty or price.
      const firstInp = last.querySelector('.lf-inp:not([readonly])');
      if (firstInp) firstInp.focus();
    }
  }, 40);
}

async function createProdLine(nombre) {
  if (!nombre?.trim()) return;
  $('prod-drop').classList.remove('open');
  const inp = $('newline-inp');
  if (inp) inp.value = '';
  // Show category picker modal before creating
  showNewProdModal(nombre.trim());
}

async function _doCreateProdLine(nombre, categoria, precio) {
  const cat = USER_CATS[0]?.name || 'general';
  const defCat = categoria || cat;
  try {
    const res = await sb('productos', '', 'POST', {
      nombre: nombre.trim(), tipo_precio: 'fijo',
      precio_base: parseFloat(precio)||0, categoria: defCat,
      produccion: 'inhouse', moneda: 'MXN',
    });
    const np = res[0];
    DATA.productos.push(np);
    DATA.productos.sort((a, b) => (a.nombre || '').localeCompare(b.nombre || ''));
    addLine(np);
    toast(`"${esc(np.nombre)}" creado — asigna precio y categoría`);
  } catch (e) {
    // Fallback: add as unsaved line with standard strategy
    const fakeProd = { id: null, nombre: nombre.trim(), categoria: defCat, precio_base: 0 };
    addLine(fakeProd);
    toast(`"${nombre}" agregado a la orden`);
  }
}

// ── TOTALS — uses each line's strategy for subtotal ──
function calcTotals() {
  const sub = OF.lines.reduce((s, l) => s + (parseFloat(l.subtotal) || 0), 0);
  const disc = sub * (parseFloat(OF.descuento_pct) || 0) / 100;
  const after = sub - disc;

  let cargosTotal = 0;
  const cargosDesglose = [];
  TAX_CONFIG.filter(t => t.enabled).forEach(t => {
    const key = String(t.id);
    // Default ON — only OFF if explicitly set false in override
    const isOn = (OF.cargos_override && key in OF.cargos_override)
      ? !!OF.cargos_override[key]
      : true;
    const base = (t.aplicar_a === 'total') ? (after + cargosTotal) : after;
    const monto = isOn
      ? (t.tipo === 'fijo' ? parseFloat(t.rate)||0 : base * (parseFloat(t.rate)||0) / 100)
      : 0;
    if (isOn) cargosTotal += monto;
    cargosDesglose.push({ id: t.id, label: t.label, rate: t.rate, tipo: t.tipo, monto, isOn });
  });
  const iva = cargosDesglose.filter(c=>c.isOn)[0]?.monto || 0;
  return { sub, disc, after, iva, cargosDesglose, cargosTotal, total: after + cargosTotal };
}

function toggleCargo(cargoId) {
  if (!OF.cargos_override) OF.cargos_override = {};
  const key = String(cargoId);
  const current = (key in OF.cargos_override) ? OF.cargos_override[key] : true;
  OF.cargos_override[key] = !current;
  refreshTotals();
  // Persist immediately if order exists
  if (OF.id) {
    const hasImgs = (OF.imagenes||[]).length > 0;
    const hasCo = Object.keys(OF.cargos_override).length > 0;
    const imgJson = JSON.stringify({ imgs: OF.imagenes||[], co: OF.cargos_override });
    sb('ordenes', `id=eq.${OF.id}`, 'PATCH', { imagenes_json: imgJson }).catch(()=>{});
  }
}

function buildTotalsHTML(tot){

        <div class="tot-row">

              ${c.isOn?'✓ ':''} ${c.label} ${c.tipo==='fijo'?'$'+c.rate:c.rate+'%'}

          </span>

      </span>
      <span style="font-family:'DM Mono',monospace;color:${tot.disc>0?'var(--amber)':'var(--t3)'}">${tot.disc>0?'−$'+fmt(tot.disc):'—'}</span>

function refreshTotals(){
  // Recompute each line via its strategy (respects manual override)
  OF.lines.forEach(l=>{
    if(l.precio_manual===null||l.precio_manual===undefined){
      const strat=LINE_STRATEGIES[l.multiplier]||LINE_STRATEGIES.standard;
      if(strat&&typeof strat.calcSubtotal==='function'){
        l.subtotal=strat.calcSubtotal(l);
      } else {
        // Fallback: qty * price
        l.subtotal=(parseFloat(l.qty)||1)*(parseFloat(l.price)||0);
      }
    }
    // Update the inline subtotal span without re-rendering the whole line
    const span=document.getElementById('lsub-'+OF.lines.indexOf(l));
    if(span){
      span.textContent='$'+fmt(l.subtotal);
      span.style.color=l.precio_manual!==null?'var(--amber)':'var(--t2)';
    }
  });
  const tot=calcTotals();
  const tp=$('totals-panel');if(tp){
    tp.innerHTML=buildTotalsHTML(tot);

  }
  const pp=$('pay-panel');if(pp){
    pp.innerHTML=buildPayHTML(tot.total);
    if(_payOpen){
      const pb=$('pay-body');const pc=$('pay-chev');
      if(pb)pb.style.display='block';
      if(pc)pc.style.transform='rotate(180deg)';
    }

  }
}

async function addPago(){
  // Ensure panel is open first so elements are in DOM
  if(!_payOpen){ _payOpen=true; const b=$('pay-body'); if(b)b.style.display='block'; }
  const montoEl=$('pay-monto');
  if(!montoEl){ toast('Error: recarga la página'); return; }
  const monto=parseFloat(montoEl.value)||0;
  if(monto<=0){ toast('Ingresa un monto válido'); montoEl.focus(); return; }
  const metodo=$('pay-metodo')?.value||'efectivo';
  const nota=$('pay-nota')?.value||'';

  // Save to Supabase immediately if order already exists
  let pagoId = null;
  if(OF.id){
    try{
      const res = await sb('orden_pagos','','POST',{orden_id:OF.id, monto, metodo, fecha:todayISO(), nota});
      pagoId = res?.[0]?.id || null;
      // Also update the orden.pagado total
      const newPagado = OF.pagos.reduce((s,p)=>s+(parseFloat(p.monto)||0), monto);
      await sb('ordenes',`id=eq.${OF.id}`,'PATCH',{pagado:newPagado}).catch(()=>{});
    }catch(e){ toast('Error guardando pago: '+e.message); return; }
  }

  OF.pagos.push({id:pagoId, monto, metodo, fecha:todayISO(), nota});
  OF.pagado = OF.pagos.reduce((s,p)=>s+(parseFloat(p.monto)||0),0);
  _payOpen=true;
  // Auto-promote status when payment added
  if(OF.status==='cotizacion'){
    OF.status='confirmada';
    const sel=document.querySelector('.of-head select');
    if(sel)sel.value='confirmada';
  }
  refreshTotals();
  setTimeout(()=>{ const m=$('pay-monto'); if(m){m.value='';m.focus();} const n=$('pay-nota'); if(n)n.value=''; },80);
  toast('Pago registrado ✓');
}

async function remPago(i){
  const p = OF.pagos[i];
  if(p?.id && OF.id){
    try{ await sb('orden_pagos',`id=eq.${p.id}`,'DELETE'); }catch(e){}
    // Update pagado total
    const newPagado = OF.pagos.filter((_,j)=>j!==i).reduce((s,x)=>s+(parseFloat(x.monto)||0),0);
    await sb('ordenes',`id=eq.${OF.id}`,'PATCH',{pagado:newPagado}).catch(()=>{});
  }
  OF.pagos.splice(i,1);

  _payOpen=true;
  refreshTotals();
}

// Tries progressively stripped payloads to handle DB schemas that may lack iva/pagado columns
async function saveOrder(){
  const tot=calcTotals();
  const paid=OF.pagos.reduce((s,p)=>s+(parseFloat(p.monto)||0),0);
  // Pack imagenes + cargos_override into imagenes_json
  const hasImgs = (OF.imagenes||[]).length > 0;
  const hasCo = Object.keys(OF.cargos_override||{}).length > 0;
  const imgJson = (hasImgs || hasCo)
    ? JSON.stringify({ imgs: OF.imagenes||[], co: OF.cargos_override||{} })
    : undefined;
  const base={
    cliente_id:OF.cliente_id||null, status:OF.status,
    fecha_entrega:OF.fecha_entrega||null, notas:OF.notas, moneda:DEFAULT_MONEDA,
    descuento_pct:OF.descuento_pct, subtotal:tot.sub, total:tot.total,
    numero:OF.id?undefined:`ORD-${Date.now().toString(36).toUpperCase()}`,
  };
  const attempts=[
    {...base,iva:OF.iva,pagado:paid,imagenes_json:imgJson},  // full
    {...base,iva:OF.iva,pagado:paid},                        // no imagenes
    {...base,iva:OF.iva},                                    // no pagado
    {...base,pagado:paid},                                   // no iva
    {...base},                                               // bare minimum
  ];
  const run=async payload=>{
    if(OF.id){await sb('ordenes',`id=eq.${OF.id}`,'PATCH',payload);return OF.id;}
    else{const res=await sb('ordenes','','POST',payload);return res[0].id;}
  };
  for(const payload of attempts){
    try{
      const oid=await run(payload);
      await saveOrderLines(oid);
      await loadAll();toast('Guardado ✓');
      if(isDesktop()){const sid=OF.id;renderOrders();if(sid)setTimeout(()=>openOrderDesktop(sid),80);}
      else renderOrders();return;
    }catch(e){
      if(!e.message.includes('400')){{toast('Error: '+e.message);return;}}
      // 400 = schema mismatch, try next stripped payload
    }
  }
  toast('Error: no se pudo guardar — verifica el esquema de la DB');
}

async function saveOrderLines(oid) {
  if (OF.id) await sb('orden_lineas', `orden_id=eq.${oid}`, 'DELETE');
  for (const l of OF.lines) {
    // Pack strategy-specific data into opciones_json for persistence
    const stratData = {
      multiplier: l.multiplier || 'standard',
      ancho: l.ancho, alto: l.alto, unidad_dim: l.unidad_dim,
      medida: l.medida, unidad_medida: l.unidad_medida,
      tier_idx: l.tier_idx, tiers: l.tiers,
      precio_manual: l.precio_manual,
      categoria: l.categoria,
      img_url: l.img_url||'',
    };
    await sb('orden_lineas', '', 'POST', {
      orden_id: oid,
      producto_id: l.prod_id || null,
      producto_nombre: l.prod_nombre || '',
      cantidad: l.qty || 1,
      precio_unitario: l.price || 0,
      subtotal: l.subtotal || 0,
      status_linea: l.status_linea || 'pendiente',
      notas: l.notas_linea || '',
      opciones_json: stratData,
    });
  }
  // Pagos: only save ones without an id (not yet persisted)
  // Already-persisted pagos were saved immediately via addPago()
  const newPagos = OF.pagos.filter(p => !p.id);
  for (const p of newPagos) {
    try {
      const res = await sb('orden_pagos', '', 'POST', { orden_id: oid, monto: p.monto, metodo: p.metodo, fecha: p.fecha, nota: p.nota });
      if (res?.[0]?.id) p.id = res[0].id;
    } catch (e) {}
  }
  // Update pagado total on the order
  const totalPagado = OF.pagos.reduce((s,p)=>s+(parseFloat(p.monto)||0),0);
  try { await sb('ordenes', `id=eq.${oid}`, 'PATCH', { pagado: totalPagado }); } catch(e) {}
}

// Restore strategy data when loading a saved order
function hydrateLines(rawLines) {
  return rawLines.map(l => {
    const strat = l.opciones_json || {};
    const multiplier = strat.multiplier || 'standard';
    const base = {
      id: l.id,
      multiplier,
      prod_id: l.producto_id,
      prod_nombre: l.producto_nombre || '',
      categoria: strat.categoria || '',
      qty: parseFloat(l.cantidad) || 1,
      price: parseFloat(l.precio_unitario) || 0,
      subtotal: parseFloat(l.subtotal) || 0,
      precio_manual: strat.precio_manual ?? null,
      status_linea: l.status_linea || 'pendiente',
      notas_linea: l.notas || '',
      img_url: strat.img_url || '',
      _notesOpen: false,
    };
    if (multiplier === 'dimensional') {
      return { ...base, ancho: strat.ancho || 1, alto: strat.alto || 1, unidad_dim: strat.unidad_dim || 'm' };
    }
    if (multiplier === 'peso_vol') {
      return { ...base, medida: strat.medida || 1, unidad_medida: strat.unidad_medida || 'kg' };
    }
    if (multiplier === 'tiers') {
      return { ...base, tier_idx: strat.tier_idx || 0, tiers: strat.tiers || [] };
    }
    return base;
  });
}

async function loadKanbanLines(){
  const activeOrds=DATA.ordenes.filter(o=>!['entregada','cancelada'].includes(o.status));
  for(const o of activeOrds){
    const el=document.getElementById('klines-'+o.id);
    if(!el)continue;
    try{
      const lines=await sb('orden_lineas',`select=producto_nombre,cantidad,status_linea&orden_id=eq.${o.id}&order=created_at`);
      if(!lines||!lines.length){el.innerHTML='<span style="color:var(--t3)">Sin productos</span>';continue;}
      cacheOrderLines(o.id, lines);
      cacheOrderLines(o.id, lines);
      // Update product name in card header
      const prodEl = document.getElementById('kprod-'+o.id);
      if(prodEl) prodEl.textContent = lines.map(l=>l.producto_nombre||'').filter(Boolean).join(', ') || 'Sin producto';
      el.innerHTML=lines.map(l=>{
        const st=l.status_linea||'pendiente';
        const dot=st==='listo'?'🟢':st==='en_proceso'?'🟡':'⚪';
        return`<div>${dot} ${esc(l.producto_nombre||'?')}${l.cantidad&&l.cantidad>1?' ×'+l.cantidad:''}</div>`;
      }).join('');
    }catch(e){el.innerHTML='';} 
  }
}

async function onKanbanDrop(e, newStatus) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  const id = e.dataTransfer.getData('id');
  if (!id) return;
  try {
    await sb('ordenes', `id=eq.${id}`, 'PATCH', { status: newStatus });
    await loadAll();
    renderKanban();
    toast(`Movida a ${newStatus} ✓`);
  } catch (err) { toast('Error al mover'); }
}

async function duplicateOrder(id) {

  let lines = [];

  OF = {

async function onDashUrgDrop(e, zone) {
  e.preventDefault();
  const ordId = e.dataTransfer.getData('dashOrdId');
  if (!ordId) return;
  const ord = DATA.ordenes.find(o => o.id === ordId);
  if (!ord) return;

  const today = new Date();
  today.setHours(0,0,0,0);

  let newDate;
  if (zone === 'overdue') {
    // Drop into Vencidas → set to today (so it appears as "delivers today")
    newDate = today;
  } else if (zone === 'today') {
    newDate = today;
  } else if (zone === '3days') {
    // Place at 2 days from now (middle of the 1-3 day window)
    newDate = new Date(today); newDate.setDate(today.getDate() + 2);
  } else if (zone === 'week') {
    // Place at 5 days from now (middle of the 4-7 day window)
    newDate = new Date(today); newDate.setDate(today.getDate() + 5);
  } else if (zone === 'ready') {
    // Just change status to 'lista', don't change date
    try {
      await sb('ordenes', `id=eq.${ordId}`, 'PATCH', { status: 'lista' });
      ord.status = 'lista';
      toast(`✓ "${getOrderProductName(ord)||'Orden'}" marcada como lista para entregar`);
      renderDashboard();
    } catch(e) { toast('Error: ' + e.message); }
    return;
  }

  const dateStr = newDate.toISOString().slice(0,10);
  const oldDate = ord.fecha_entrega?.slice(0,10) || 'sin fecha';

  const zoneLabels = { overdue:'Hoy (vencida)', today:'Hoy', '3days':'En 2 días', week:'En 5 días' };
  const label = zoneLabels[zone] || zone;

  try {
    await sb('ordenes', `id=eq.${ordId}`, 'PATCH', { fecha_entrega: dateStr });
    ord.fecha_entrega = dateStr;
    toast(`📅 Entrega actualizada → ${label}`);
    renderDashboard();
  } catch(e) { toast('Error: ' + e.message); }
}

function buildMonthGrid(){
  const today=new Date();const todayStr=isoDate(today);
  const year=CAL.year,month=CAL.month;
  const first=new Date(year,month,1);
  const startDow=(first.getDay()+6)%7;
  const daysInMonth=new Date(year,month+1,0).getDate();
  const days=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
  const delivCounts={};
  DATA.ordenes.forEach(o=>{
    if(!o.fecha_entrega) return;
    const isActive = !['entregada','cancelada'].includes(o.status);
    const isDonePaid = o.status==='entregada' && parseFloat(o.pagado||0)>=parseFloat(o.total||0)-0.01;
    if(isActive || (CAL_SHOW_DONE && isDonePaid))
      delivCounts[o.fecha_entrega.slice(0,10)]=(delivCounts[o.fecha_entrega.slice(0,10)]||0)+1;
  });
  let hdr=`<div class="cal-month-grid" style="margin-bottom:4px">`;
  days.forEach(d=>hdr+=`<div style="font-size:10px;color:var(--t3);font-weight:700;text-align:center;padding:4px 0">${d}</div>`);
  hdr+='</div>';
  let grid='<div class="cal-month-grid">';
  for(let i=0;i<startDow;i++)grid+=`<div class="cal-month-cell" style="opacity:.2"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const ords=DATA.ordenes.filter(o=>{
      if(!o.fecha_entrega||o.fecha_entrega.slice(0,10)!==ds) return false;
      const isActive=!['entregada','cancelada'].includes(o.status);
      const isDonePaid=o.status==='entregada'&&parseFloat(o.pagado||0)>=parseFloat(o.total||0)-0.01;
      return isActive||(CAL_SHOW_DONE&&isDonePaid);
    });
    const cnt=delivCounts[ds]||0;
    const isToday=ds===todayStr;
    grid+=`<div class="cal-month-cell${isToday?' today-col':''}" data-date="${ds}"
      ondragover="event.preventDefault();this.classList.add('drag-over')"
      ondragleave="this.classList.remove('drag-over')"
      ondrop="onCalDrop(event,'${ds}')">
      <div class="cal-month-date" style="${isToday?'color:var(--acc);font-weight:800;':''}">
        ${isToday?`<span style="display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;background:var(--acc);color:#080808;border-radius:50%;font-size:11px;font-weight:800">${d}</span>`:d}
        ${cnt>0?` <span style="font-size:9px;color:var(--t3)">(${cnt})</span>`:''}
      </div>
      ${ords.slice(0,3).map(o=>{
        const cl=DATA.clientes.find(c=>c.id===o.cliente_id);
        const sc=getOrderColor(o);
        const prodName = getOrderProductName(o) || getOrderLabel(o);
        return`<div class="cal-card" style="background:${sc}20;color:${sc};border-left:2px solid ${sc}"
          draggable="true"
          ondragstart="onCalDragStart(event,'${o.id}')"
          ondragend="onCalDragEnd(event)"
          onclick="event.stopPropagation();openEditOrder('${o.id}')"
          oncontextmenu="event.preventDefault();event.stopPropagation();showOrderCtxMenu(event,'${o.id}')"
          ondblclick="event.stopPropagation();openEditOrder('${o.id}')"
          title="${esc(prodName)}${cl?' — '+clName(cl):''}">
          <div class="cc-prod">${esc(prodName)}</div>
          ${cl?`<div class="cc-cl">${esc(cl.nombre.split(' ')[0]||clName(cl))}</div>`:''}
        </div>`;
      }).join('')}
      ${ords.length>3?`<div style="font-size:9px;color:var(--t3);padding:1px 4px">+${ords.length-3} más</div>`:''}
    </div>`;
  }
  grid+='</div>';
  return hdr+grid;
}

}

function addClNote(cid, type, text){
  if(!_clNotes[cid]) _clNotes[cid]=[];
  _clNotes[cid].push({id:'n'+Date.now(),type,text:text.trim(),ts:new Date().toISOString()});

}
function delClNote(cid, nid){
  if(!_clNotes[cid]) return;

function cpAddNote(cid){
  const inp=$('cp-note-inp');
  if(!inp||!inp.value.trim()){toast('Escribe algo primero');return;}
  if(!cid){toast('Guarda el cliente primero');return;}
  // read type from select if present
  const sel=$('cp-note-type');
  if(sel) _cpNoteType=sel.value;
  addClNote(cid,_cpNoteType,inp.value);
  openClientProfile(cid);
  setTimeout(()=>{ const el=$('cp-note-inp'); if(el)el.focus(); },60);
}
function cpDelNote(cid, nid){
  if(!confirm('¿Eliminar esta nota?'))return;
  delClNote(cid,nid);
  openClientProfile(cid);
}
function cpMarkPendingCotiz(cid){
  // Save current textarea content as a note tagged "solicitud" + pendingCotiz flag
  const inp=$('cp-note-inp');
  const text=(inp&&inp.value.trim())||'Pendiente de cotizar';
  if(!cid){toast('Guarda el cliente primero');return;}
  if(!_clNotes[cid]) _clNotes[cid]=[];
  _clNotes[cid].push({id:'n'+Date.now(),type:'solicitud',text,ts:new Date().toISOString(),pendingCotiz:true});
  saveClNotes();
  toast('Marcado como pendiente de cotizar ✓');
  openClientProfile(cid);
}
function cpOpenPendingCotiz(cid, nid){
  // Mark the note as resolved and open a new order for this client
  if(_clNotes[cid]){
    const n=_clNotes[cid].find(x=>x.id===nid);
    if(n){ n.pendingCotiz=false; n.cotizOpened=new Date().toISOString(); saveClNotes(); }
  }
  openNewOrderForClient(cid);
}
function openNewOrderForClient(cid){
  OF={id:null,numero:'',cliente_id:cid,cliente_nombre:'',status:'cotizacion',fecha_entrega:defaultDelivery(),notas:'',moneda:DEFAULT_MONEDA,descuento_pct:0,iva:true,lines:[],pagos:[],pagado:0};
  const cl=DATA.clientes.find(c=>c.id===cid);
  if(cl) OF.cliente_nombre=clName(cl);
  navigate('orders');
  setTimeout(()=>renderOrderForm(),60);
}
async function saveClientFromProfile(id){
  const d={nombre:$('cf-n').value,empresa:$('cf-e').value,telefono:$('cf-t').value,email:$('cf-m').value,direccion:$('cf-d').value,notas:$('cf-notes').value};
  try{
    if(id){ await sb('clientes',`id=eq.${id}`,'PATCH',d); await loadAll(); toast('Guardado ✓'); _cpTab='actividad'; openClientProfile(id); }
    else { const r=await sb('clientes','','POST',d); await loadAll(); toast('Cliente creado ✓'); _cpTab='actividad'; openClientProfile(r[0].id); }
  }catch(e){toast('Error: '+e.message);}
}
// editClient is now openClientProfile — keeping as alias for any remaining refs
function editClient(id){ openClientProfile(id||null, id?'actividad':'datos'); }
async function delClient(id){if(!confirm('¿Eliminar?'))return;try{await sb('clientes',`id=eq.${id}`,'DELETE');await loadAll();renderClients();}catch(e){}}

function setTheme(t){BRAND.theme=t;saveBrand();applyBrand();renderSettings('theme');}
function setCustomColor(slot,hex){if(!BRAND.custom)BRAND.custom={...PRESET_THEMES.forest.colors};BRAND.custom[slot]=hex;BRAND.theme='custom';saveBrand();applyBrand();}
function setAccent(hex){setCustomColor('c1',hex);}
function previewAccent(hex){document.documentElement.style.setProperty('--acc',hex);document.documentElement.style.setProperty('--c1',hex);}
function commitAccent(){const hex=$('accent-picker')?.value;if(hex)setAccent(hex);}
function applyLogoUrl(){BRAND.logoUrl=$('brand-logo-url')?.value||'';saveBrand();applyBrand();renderSettings('branding');}
function applyLogoFile(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{BRAND.logoUrl=e.target.result;saveBrand();applyBrand();renderSettings('branding');};
  reader.readAsDataURL(file);
}

//  SUPABASE STORAGE — upload image, get public URL (legacy fallback)
// ════════════════════════════════════════════════════════
async function uploadToStorage(file, path){
  const formData = new FormData();
  formData.append('', file);
  const url = `${SB_URL}/storage/v1/object/craftcrm/${path}`;
  const r = await fetch(url, {
    method: 'POST',
    headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` },
    body: formData,
  });
  if(!r.ok){
    const e = await r.json().catch(()=>({message:r.status}));
    if(r.status === 400 || r.status === 409){
      const r2 = await fetch(url, {
        method: 'PUT',
        headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` },
        body: formData,
      });
      if(!r2.ok) throw new Error('Storage error: ' + r2.status);
    } else {
      throw new Error(e.message || 'Storage error: ' + r.status);
    }
  }
  return `${SB_URL}/storage/v1/object/public/craftcrm/${path}`;
}

//  GOOGLE DRIVE — image upload & public URL
// ════════════════════════════════════════════════════════
// ════════════════════════════════════════════════════════
//  CLOUDINARY — upload image, get persistent public URL
// ════════════════════════════════════════════════════════
const CL_CLOUD  = 'dzajhvx5z';
const CL_PRESET = 'CraftPreset';
const CL_UPLOAD = `https://api.cloudinary.com/v1_1/${CL_CLOUD}/image/upload`;

async function uploadToCloudinary(file) {
  const form = new FormData();
  form.append('file', file);
  form.append('upload_preset', CL_PRESET);
  form.append('folder', 'craftcrm');
  const res = await fetch(CL_UPLOAD, { method: 'POST', body: form });
  if (!res.ok) {
    const e = await res.json().catch(()=>({}));
    throw new Error(e.error?.message || 'Cloudinary error: ' + res.status);
  }
  const data = await res.json();
  return data.secure_url;
}

async function addOrderImagesFromFile(input){
  const files = Array.from(input.files);
  if(!files.length) return;

  if(!OF.imagenes) OF.imagenes = [];

  // 1. Show instant local previews while uploading
  const placeholders = files.map(file => {
    const localUrl = URL.createObjectURL(file);
    const entry = { url: localUrl, caption: file.name.replace(/\.[^.]+$/,''), uploaded_at: todayISO(), source: 'uploading' };
    OF.imagenes.push(entry);
    return { file, entry, localUrl };
  });
  showOrderImagesModal(); // show instantly with local previews
  _ordImgStatus(`⏳ Subiendo ${files.length} imagen${files.length>1?'es':''}...`, 'info');

  // 2. Upload each file and replace placeholder URL with Cloudinary URL
  let uploaded = 0, failed = 0;
  for(const { file, entry, localUrl } of placeholders){
    try{
      _ordImgStatus(`⏳ Subiendo: ${file.name}`, 'info');
      let url, source;
      try{
        url = await uploadToCloudinary(file);
        source = 'cloudinary';
      } catch(clErr){
        console.warn('Cloudinary failed, using base64:', clErr.message);
        url = await new Promise((res,rej) => {
          const r = new FileReader();
          r.onload = e => res(e.target.result);
          r.onerror = rej;
          r.readAsDataURL(file);
        });
        source = 'local';
      }
      // Replace placeholder with real URL
      entry.url = url;
      entry.source = source;
      URL.revokeObjectURL(localUrl);
      uploaded++;

      // Update the <img> tag in the open modal directly (no full rebuild)
      const idx = OF.imagenes.indexOf(entry);
      const imgEl = document.querySelector(`#cmodal img[src="${CSS.escape(localUrl)}"]`);
      if(imgEl) { imgEl.src = url; imgEl.onclick = () => window.open(url,'_blank'); }

    } catch(e){ failed++; console.error(e); }
  }

  // 3. Persist to Supabase immediately
  if(OF.id){
    const imgJson = JSON.stringify({ imgs: OF.imagenes, co: OF.cargos_override||{} });
    sb('ordenes', `id=eq.${OF.id}`, 'PATCH', { imagenes_json: imgJson }).catch(()=>{});
  }

  if(failed > 0) _ordImgStatus(`⚠ ${uploaded} subida${uploaded!==1?'s':''}, ${failed} fallaron`, 'err');
  else _ordImgStatus(`✓ ${uploaded} imagen${uploaded!==1?'es':''} subida${uploaded!==1?'s':''} correctamente`, 'ok');
}

function addOrderImageFromUrl(){
  const url = document.getElementById('ord-img-url')?.value?.trim();
  if(!url){ toast('Ingresa una URL'); return; }
  if(!OF.imagenes) OF.imagenes = [];
  OF.imagenes.push({ url, caption: '', uploaded_at: todayISO() });
  showOrderImagesModal();
}

function removeOrderImage(i){
  if(!OF.imagenes) return;
  OF.imagenes.splice(i, 1);

}

async function clearDB(){

  if(!confirm('Confirma: se borrarán todos los clientes, productos, proveedores y órdenes.'))return;
  // Extra security: require PIN re-entry if set
  if(isPinSet()){
    const pin=prompt('Ingresa tu PIN para confirmar el borrado total:');
    if(!pin){return;}
    const hash=await sha256(pin);
    if(hash!==getPinHash()){toast('PIN incorrecto — operación cancelada');return;}
  }
  toast('Borrando...', 8000);
  try{
    await sb('orden_pagos','','DELETE').catch(()=>{});
    await sb('orden_lineas','','DELETE').catch(()=>{});
    await sb('ordenes','','DELETE').catch(()=>{});
    await sb('clientes','','DELETE').catch(()=>{});
    await sb('productos','','DELETE').catch(()=>{});
    await sb('proveedores','','DELETE').catch(()=>{});
    USER_CATS=[];saveUserCats();
    await loadAll();toast('Base de datos limpia ✓');navigate(curPage);
  }catch(e){toast('Error: '+e.message);}
}

      }

  }

}

async function testMPConnection(){
  const token=BRAND.mpToken;
  const statusEl=$('mp-status');
  if(!token){if(statusEl)statusEl.innerHTML='<span style="color:var(--amber)">⚠ Ingresa tu token primero</span>';return;}
  if(statusEl)statusEl.innerHTML='<span style="color:var(--t3)">Verificando...</span>';
  // Validate token format locally first
  const isSandbox=token.startsWith('TEST-');
  const isProd=token.startsWith('APP_USR-');
  if(!isSandbox&&!isProd){
    if(statusEl)statusEl.innerHTML='<span style="color:var(--red)">✗ Token inválido — debe empezar con TEST- o APP_USR-</span>';
    return;
  }
  // Validate format locally — no proxy needed (CORS restriction is by design from browser)
  if(isSandbox||isProd){
    if(statusEl)statusEl.innerHTML=`<span style="color:var(--green)">✓ ${isSandbox?'Token TEST guardado':'Token producción guardado'}</span>`;
    BRAND.mpToken=token;saveBrand();
    sessionStorage.setItem('craftcrm_mpt',token);
    toast('Token guardado ✓');
  }
}

async function generateMPLink(amount){
  const token=BRAND.mpToken;
  if(!token){toast('Configura tu token de Mercado Pago en Ajustes → Datos');navigate('settings');renderSettings('data');return;}
  const cl=DATA.clientes.find(c=>c.id===OF.cliente_id);
  const amountNum=parseFloat(amount)||0;
  if(amountNum<=0){toast('El monto debe ser mayor a $0');return;}

  toast('Generando link de pago...', 5000);

  // MP API no permite CORS desde el browser — usamos su endpoint público de preferencias
  // via un proxy CORS alternativo (allorigins) o directamente con no-cors workaround.
  // La forma correcta es crear la preferencia server-side, pero aquí usamos
  // el endpoint con mode:'no-cors' + fallback a link manual.
  try{
    const body={
      items:[{
        id: OF.id||('ord-'+Date.now()),
        title: `${esc(BRAND.name||'CraftCRM')} — Orden ${OF.numero||''}${cl?' · '+cl.nombre:''}`.slice(0,255),
        quantity:1,
        unit_price: amountNum,
        currency_id:'MXN',
      }],
      back_urls:{
        success: window.location.href,
        failure: window.location.href,
        pending: window.location.href,
      },
      auto_return:'approved',
    };
    if(cl?.email)body.payer={email:cl.email};

    // MP API requiere backend para CORS — mostrar flujo de cobro directo
    showMPFallbackModal(amountNum, cl, token);

  }catch(e){
    console.error('MP error:',e);
    showMPFallbackModal(amountNum, cl, token);
  }
}

// Cache de líneas cargadas para el taller
let _tallerLines = [];   // [{lineData, orden, cliente}]
let _tallerFilter = 'all';  // 'all' | 'pendiente' | 'en_proceso' | 'listo'
let _tallerLoading = false;

async function renderTaller(filter) {
  if(filter !== undefined) _tallerFilter = filter;
  lpHide(); dpHide();
  ctxSet('Taller');

  // Loading state
  $('main').innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:60vh;color:var(--t3);flex-direction:column;gap:12px">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="animation:spin 1s linear infinite"><path d="M21 12a9 9 0 11-6.219-8.56"/></svg>
    <div style="font-size:12px">Cargando taller...</div>
  </div>
  <style>@keyframes spin{to{transform:rotate(360deg)}}</style>`;

  // Load lines from all active orders
  const activeOrds = DATA.ordenes.filter(o => !['entregada','cancelada'].includes(o.status));
  const allLines = [];

  for(const ord of activeOrds) {
    try {
      const lines = await sb('orden_lineas',
        `select=*&orden_id=eq.${ord.id}&order=created_at`
      );
      if(!lines || !lines.length) continue;
      const cl = DATA.clientes.find(c => c.id === ord.cliente_id);
      for(const l of lines) {
        // Enrich with order + client data
        const strat = l.opciones_json || {};
        allLines.push({
          line_id: l.id,
          orden_id: ord.id,
          orden_num: ord.numero || ord.id.slice(0,8).toUpperCase(),
          orden_status: ord.status,
          fecha_entrega: ord.fecha_entrega,
          cliente: cl?.nombre || 'Sin cliente',
          producto: l.producto_nombre || '—',
          cantidad: parseFloat(l.cantidad) || 1,
          status_linea: l.status_linea || 'pendiente',
          notas: l.notas || '',
          categoria: strat.categoria || l.categoria || '',
          img_url: strat.img_url || '',
        });
      }
    } catch(e) { /* orden sin líneas */ }
  }

  _tallerLines = allLines;
  _renderTallerBoard();
}

function _renderTallerBoard() {
  const lines = _tallerFilter === 'all'
    ? _tallerLines
    : _tallerLines.filter(l => l.status_linea === _tallerFilter);

  const total = lines.length;
  const pendiente = _tallerLines.filter(l => l.status_linea === 'pendiente').length;
  const en_proceso = _tallerLines.filter(l => l.status_linea === 'en_proceso').length;
  const listo = _tallerLines.filter(l => l.status_linea === 'listo').length;

  // Group by category
  // Get all categories from USER_CATS + any uncategorized
  const catMap = {};  // catName → {color, lines[]}

  // Initialize with USER_CATS order
  for(const cat of USER_CATS) {
    if(cat.name) catMap[cat.name] = { color: cat.color, label: cat.name, lines: [] };
  }

  // Distribute lines into categories
  for(const l of lines) {
    const key = l.categoria || '';
    if(key && catMap[key]) {
      catMap[key].lines.push(l);
    } else if(key) {
      // Category exists in lines but not in USER_CATS (maybe renamed)
      if(!catMap[key]) catMap[key] = { color: '#888888', label: key, lines: [] };
      catMap[key].lines.push(l);
    } else {
      // Truly uncategorized
      if(!catMap['__sin_cat__']) catMap['__sin_cat__'] = { color: '#555555', label: 'Sin categoría', lines: [] };
      catMap['__sin_cat__'].lines.push(l);
    }
  }

  // Remove empty columns (unless showing all)
  const cols = Object.entries(catMap).filter(([,v]) => v.lines.length > 0);

  const todayStr = new Date().toISOString().slice(0,10);
  const in3days = new Date(); in3days.setDate(in3days.getDate()+3);
  const in3Str = in3days.toISOString().slice(0,10);

    <button class="taller-filter${_tallerFilter==='all'?' on':''}" onclick="renderTaller('all')">

    </button>
    <button class="taller-filter${_tallerFilter==='pendiente'?' on':''}" onclick="renderTaller('pendiente')"
      style="color:#4d94ff">

    </button>
    <button class="taller-filter${_tallerFilter==='en_proceso'?' on':''}" onclick="renderTaller('en_proceso')"
      style="color:var(--c3)">
      🔶 En proceso <span style="opacity:.6;margin-left:3px">${en_proceso}</span>
    </button>
    <button class="taller-filter${_tallerFilter==='listo'?' on':''}" onclick="renderTaller('listo')"
      style="color:var(--c2)">
      ✅ Listo <span style="opacity:.6;margin-left:3px">${listo}</span>
    </button>
    <div style="flex:1"></div>
    <span style="font-size:11px;color:var(--t3)">${cols.length} categoría${cols.length!==1?'s':''} · ${lines.length} ítem${lines.length!==1?'s':''}</span>
    <button class="btn btn-ghost" onclick="renderTaller()" style="font-size:11px;padding:5px 10px">↺ Actualizar</button>
  </div>`;

  // Build columns
  const colsHtml = cols.length === 0
    ? `<div style="padding:60px 20px;text-align:center;color:var(--t3);font-size:13px">
        ${_tallerFilter!=='all' ? 'Sin ítems en este estado' : 'No hay órdenes activas con productos'}

            ? Math.round((new Date(l.fecha_entrega) - new Date()) / 86400000)
            : null;

            : daysLeft !== null && daysLeft <= 3 ? 'soon' : '';
          const dateLabel = l.fecha_entrega
            ? (daysLeft < 0 ? `⚠ ${Math.abs(daysLeft)}d atrasado`
              : daysLeft === 0 ? '⚠ Hoy'
              : daysLeft === 1 ? '⏰ Mañana'
              : `${fmtDateES(l.fecha_entrega)} (${daysLeft}d)`)
            : '';

          const stateKey = l.status_linea || 'pendiente';
          const imgHtml = l.img_url
            ? `<img src="${l.img_url}" style="width:100%;height:52px;object-fit:cover;border-radius:4px;margin-bottom:6px;display:block" onerror="this.style.display='none'">`

async function setTallerLineStatus(lineId, ordenId, newStatus) {
  // Optimistic update in _tallerLines
  const line = _tallerLines.find(l => l.line_id === lineId);
  if(line) line.status_linea = newStatus;

  // Re-render immediately (optimistic)
  _renderTallerBoard();

  // Persist to DB
  try {
    await sb('orden_lineas', `id=eq.${lineId}`, 'PATCH', { status_linea: newStatus });
  } catch(e) {
    // Revert on error
    if(line) line.status_linea = line.status_linea; // already set, show toast
    toast('Error al actualizar: ' + e.message);
  }
}

async function setPINFromSettings(){
  const p1=document.getElementById('pin-new')?.value?.trim();
  const p2=document.getElementById('pin-confirm')?.value?.trim();
  if(!p1||p1.length!==4||!/^\d{4}$/.test(p1)){toast('El PIN debe tener exactamente 4 dígitos');return;}
  if(p1!==p2){toast('Los PINs no coinciden');return;}
  await setPIN(p1);
  renderSettings('seguridad');
}
async function changePINFromSettings(){
  const old=document.getElementById('pin-old')?.value?.trim();
  const p=document.getElementById('pin-new')?.value?.trim();
  if(!old||!p){toast('Completa ambos campos');return;}
  if(p.length!==4||!/^\d{4}$/.test(p)){toast('El PIN nuevo debe tener 4 dígitos');return;}
  const ok=await setPIN(p,old);
  if(ok) renderSettings('seguridad');
}
async function removePINFromSettings(){
  if(!confirm('¿Eliminar el PIN? La app quedará sin protección de acceso.'))return;
  const old=document.getElementById('pin-old')?.value?.trim();
  if(isPinSet()&&old){
    const hash=await sha256(old);
    if(hash!==getPinHash()){toast('PIN actual incorrecto');return;}
  }
  removePIN();
  sessionStorage.setItem('craftcrm_unlocked','1');
  toast('PIN eliminado');
  renderSettings('seguridad');
}
function saveCredsFromSettings(){
  const url=document.getElementById('sec-url')?.value?.trim();
  const key=document.getElementById('sec-key')?.value?.trim();
  if(!url||!key){toast('Completa URL y Key');return;}
  if(!url.startsWith('https://')){toast('URL inválida — debe empezar con https://');return;}
  saveCredentials(url,key);
  toast('Credenciales actualizadas — reconectando...');
  setTimeout(()=>connectSb(),500);
}
function resetCredsFromSettings(){
  if(!confirm('¿Restaurar las credenciales por defecto?'))return;
  localStorage.removeItem('craftcrm_creds');
  SB_URL=SB_URL_DEFAULT;SB_KEY=SB_KEY_DEFAULT;
  toast('Credenciales restauradas');
  renderSettings('seguridad');
}

function getOpNotes(o) {
  try { return JSON.parse(o.notas_operativas_json || '[]'); } catch(e) { return []; }
}
function getActiveOpNotes(o) {
  return getOpNotes(o).filter(n => !n.resuelta);
}
function hasActiveOpNotes(o) {
  return getActiveOpNotes(o).length > 0;
}

async function addOpNote(ordId, texto) {
  const o = DATA.ordenes.find(x => x.id === ordId);
  if (!o || !texto.trim()) return;
  const notes = getOpNotes(o);
  notes.push({ id: Date.now().toString(36), texto: texto.trim(), ts: new Date().toISOString(), resuelta: false });
  o.notas_operativas_json = JSON.stringify(notes);
  try {
    await sb('ordenes', `id=eq.${ordId}`, 'PATCH', { notas_operativas_json: o.notas_operativas_json });
  } catch(e) { toast('Error guardando nota: ' + e.message); }
}

async function resolveOpNote(ordId, noteId) {
  const o = DATA.ordenes.find(x => x.id === ordId);
  if (!o) return;
  const notes = getOpNotes(o);
  const n = notes.find(x => x.id === noteId);
  if (n) n.resuelta = true;
  o.notas_operativas_json = JSON.stringify(notes);
  try {
    await sb('ordenes', `id=eq.${ordId}`, 'PATCH', { notas_operativas_json: o.notas_operativas_json });
    renderDashboard();
  } catch(e) { toast('Error: ' + e.message); }
}

function renderDashboard(){
  // Trigger line loading if cache is still empty (first render before loadAll completes)
  const uncachedOrds = DATA.ordenes.filter(o=>!['entregada','cancelada'].includes(o.status)&&!_prodCache[o.id]);
  if(uncachedOrds.length > 0) _loadActiveOrderLines();
  const now = new Date();
  const todayStr = now.toISOString().slice(0,10);
  const in3 = new Date(now); in3.setDate(in3.getDate()+3);
  const in3Str = in3.toISOString().slice(0,10);
  const in7 = new Date(now); in7.setDate(in7.getDate()+7);
  const in7Str = in7.toISOString().slice(0,10);
  const thisMonth = now.getMonth();
  const thisYear = now.getFullYear();

  const active = DATA.ordenes.filter(o=>!['entregada','cancelada'].includes(o.status));
  const notReady = active.filter(o=>o.status!=='lista'); // exclude 'lista' from date sections

function dashShowPicker(){
  const bg=document.getElementById('dash-picker-bg');

  if(bg)bg.style.display='block';

}
function dashFilterPicker(q){
  const list=document.getElementById('dash-picker-list');
  if(!list)return;
  list.querySelectorAll('.lp-item').forEach(el=>{
    const name=el.textContent.toLowerCase();
    el.style.display=name.includes(q.toLowerCase())?'':'none';
  });
}

//  GOOGLE CONTACTS IMPORT
// ════════════════════════════════════════════════════════
const GC_CLIENT_ID = '921894159659-f28bl8jcn0h2hdbarosqtltrk6en36do.apps.googleusercontent.com';
const GC_SCOPE = 'https://www.googleapis.com/auth/contacts.readonly';
// Drive scope is requested separately by gdAuth() — same client ID, different scope
let _gcToken = null;
let _gcContacts = [];
let _gcFiltered = [];

function gcImportOpen() {
  // Show modal immediately, then auth
  gcShowModal('loading');
  if (_gcToken) {
    gcFetchContacts();
  } else {
    gcAuth();
  }
}

function gcAuth() {
  const client = google.accounts.oauth2.initTokenClient({
    client_id: GC_CLIENT_ID,
    scope: GC_SCOPE,
    callback: (resp) => {
      if (resp.error) { gcShowModal('error', resp.error); return; }
      _gcToken = resp.access_token;
      gcFetchContacts();
    },
  });
  client.requestAccessToken();
}

async function gcFetchContacts() {
  gcShowModal('loading');
  try {
    let all = [];
    let pageToken = '';
    do {
      const url = `https://people.googleapis.com/v1/people/me/connections?personFields=names,emailAddresses,phoneNumbers,organizations&pageSize=1000${pageToken ? '&pageToken=' + pageToken : ''}`;
      const res = await fetch(url, { headers: { Authorization: 'Bearer ' + _gcToken } });
      const data = await res.json();
      if (data.error) { gcShowModal('error', data.error.message); return; }
      all = all.concat(data.connections || []);
      pageToken = data.nextPageToken || '';
    } while (pageToken);

    _gcContacts = all
      .map(p => ({
        resourceName: p.resourceName,
        nombre: p.names?.[0]?.displayName || '',
        empresa: p.organizations?.[0]?.name || '',
        telefono: p.phoneNumbers?.[0]?.value || '',
        email: p.emailAddresses?.[0]?.value || '',
      }))
      .filter(p => p.nombre)
      .sort((a, b) => a.nombre.localeCompare(b.nombre));

    _gcFiltered = [..._gcContacts];
    gcShowModal('list');
  } catch(e) {
    gcShowModal('error', e.message);
  }
}

function gcShowModal(state, msg) {
  // Remove existing modal
  document.getElementById('gc-modal')?.remove();
  document.getElementById('gc-modal-bg')?.remove();

  const modal = document.createElement('div');
  modal.id = 'gc-modal';
  modal.className = 'gc-modal';

  if (state === 'loading') {
    modal.innerHTML = `
      <div class="gc-modal-bg" onclick="gcClose()"></div>
      <div class="gc-modal-box" style="align-items:center;justify-content:center;min-height:200px">
        <div style="text-align:center;padding:40px">
          <div style="font-size:13px;color:var(--t3);margin-bottom:8px">Cargando contactos de Google...</div>
          <div style="width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto"></div>

      <div class="gc-modal-bg" onclick="gcClose()"></div>
      <div class="gc-modal-box">
        <div class="gc-modal-head">
          <span class="gc-modal-title">Error</span>

        </div>
        <div class="gc-modal-body" style="padding:24px;text-align:center;color:var(--red)">${msg || 'No se pudo conectar con Google'}</div>
        <div class="gc-modal-foot">
          <button class="btn btn-ghost" onclick="gcClose()">Cerrar</button>
          <button class="btn btn-acc" onclick="gcClose();gcAuth()">Reintentar</button>
        </div>
      </div>`;

    const rows = _gcFiltered.map((ct, i) => {
      const ini = ct.nombre.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
      const alreadyExists = DATA.clientes.some(c =>
        c.nombre.toLowerCase() === ct.nombre.toLowerCase() ||
        (ct.email && c.email === ct.email)
      );
      return `<div class="gc-contact-row${alreadyExists ? ' already' : ''}">
        <input type="checkbox" id="gc-cb-${i}" value="${i}" ${alreadyExists ? 'disabled title="Ya existe en el CRM"' : ''}>
        <div class="gc-avatar">${ini}</div>
        <div class="gc-info">
          <div class="gc-name">${esc(ct.nombre)} ${alreadyExists ? '<span style=\"font-size:9px;color:var(--t3);font-weight:600\">(ya existe)</span>' : ''}</div>
          <div class="gc-sub">${[ct.empresa, ct.telefono, ct.email].filter(Boolean).join(' · ')}</div>
        </div>
      </div>`;
    }).join('');

    modal.innerHTML = `
      <div class="gc-modal-bg" onclick="gcClose()"></div>
      <div class="gc-modal-box">
        <div class="gc-modal-head">
          <span class="gc-modal-title">Importar de Google Contacts</span>
          <button onclick="gcClose()" style="background:none;border:none;color:var(--t3);font-size:20px;cursor:pointer;line-height:1">×</button>
        </div>
        <div style="padding:10px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px">

          ${rows}
        </div>

          <span id="gc-sel-count" style="font-size:11px;color:var(--t3);margin-right:auto;align-self:center">0 seleccionados</span>

          <button class="btn btn-acc" onclick="gcImportSelected()">Importar →</button>

}

function gcFilter(q) {
  _gcFiltered = q
    ? _gcContacts.filter(ct =>
        ct.nombre.toLowerCase().includes(q.toLowerCase()) ||
        ct.empresa.toLowerCase().includes(q.toLowerCase())
      )
    : [..._gcContacts];
  const countEl = document.querySelector('.gc-modal-box span[style*="white-space"]');
  if (countEl) countEl.textContent = _gcFiltered.length + ' contactos';
  const list = document.getElementById('gc-list');
  if (!list) return;
  list.innerHTML = _gcFiltered.map((ct, i) => {
    const ini = ct.nombre.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
    const exists = DATA.clientes.some(c => c.nombre.toLowerCase() === ct.nombre.toLowerCase() || (ct.email && c.email === ct.email));
    return `<div class="gc-contact-row">
      <input type="checkbox" id="gc-cb-${i}" value="${i}" ${exists ? 'disabled title="Ya existe"' : ''}>
      <div class="gc-avatar">${ini}</div>
      <div class="gc-info">
        <div class="gc-name">${esc(ct.nombre)} ${exists ? '<span style=\"font-size:9px;color:var(--t3)\">(ya existe)</span>' : ''}</div>
        <div class="gc-sub">${[ct.empresa, ct.telefono, ct.email].filter(Boolean).join(' · ')}</div>
      </div>
    </div>`;
  }).join('');
  document.querySelectorAll('#gc-list input[type=checkbox]').forEach(cb => cb.addEventListener('change', gcUpdateCount));
}

function gcUpdateCount() {
  const n = document.querySelectorAll('#gc-list input[type=checkbox]:checked').length;
  const el = document.getElementById('gc-sel-count');
  if (el) el.textContent = n + ' seleccionado' + (n !== 1 ? 's' : '');
}

function gcSelectAll() {
  document.querySelectorAll('#gc-list input[type=checkbox]:not(:disabled)').forEach(cb => cb.checked = true);
  gcUpdateCount();
}

function gcSelectNone() {
  document.querySelectorAll('#gc-list input[type=checkbox]').forEach(cb => cb.checked = false);
  gcUpdateCount();
}

async function gcImportSelected() {
  const checked = [...document.querySelectorAll('#gc-list input[type=checkbox]:checked')];
  if (checked.length === 0) { toast('Selecciona al menos un contacto'); return; }

  gcShowModal('loading');

  const toInsert = checked.map(cb => {
    const ct = _gcFiltered[parseInt(cb.value)];
    return {
      nombre: ct.nombre,
      empresa: ct.empresa || null,
      telefono: ct.telefono || null,
      email: ct.email || null,
    };
  });

  try {
    const { error } = await sb('clientes', '', 'POST', toInsert);
    if (error) throw new Error(error.message || JSON.stringify(error));
    await loadAll();
    gcShowModal('success', `${toInsert.length} contacto${toInsert.length !== 1 ? 's' : ''} importado${toInsert.length !== 1 ? 's' : ''} correctamente`);
    renderClients();
  } catch(e) {
    gcShowModal('error', e.message);
  }
}

function gcClose() {
  document.getElementById('gc-modal')?.remove();
}

async function doCreateSquareInvoice() {
  const { sqLocationId, tot, cl, orderNum } = window._sqCtx || {};
  if (!sqLocationId) { toast('Error: sin Location ID'); return; }
  const sqCurrency = DEFAULT_MONEDA;

  const confirmBtn = document.getElementById('sq-confirm-btn');
  const statusEl = document.getElementById('sq-status');
  if (confirmBtn) { confirmBtn.disabled = true; confirmBtn.textContent = 'Enviando...'; }

  const showStatus = (msg, isError) => {
    if (!statusEl) return;
    statusEl.style.display = 'block';
    statusEl.style.background = isError ? 'var(--red-dim)' : 'var(--c2-dim)';
    statusEl.style.border = `1px solid ${isError ? 'rgba(255,69,69,0.3)' : 'rgba(61,220,132,0.3)'}`;
    statusEl.style.color = isError ? '#ff9999' : 'var(--c2)';
    statusEl.textContent = msg;
  };

  const SQ = (path, method, body) => fetch(`/api/square/v2${path}`, {
    method,
    headers: { 'Content-Type': 'application/json' },
    body: body ? JSON.stringify(body) : undefined,
  });

  try {
    // Step 1: Create or find customer in Square
    let squareCustomerId = null;
    if (cl?.email || cl?.nombre) {
      try {
        const searchBody = { query: { filter: { email_address: { exact: cl.email || undefined } } } };
        const searchRes = await SQ('/customers/search', 'POST', cl.email ? searchBody : { query: {} });
        const searchData = await searchRes.json();
        const existingCustomer = searchData.customers?.find(c =>
          (cl.email && c.email_address === cl.email) ||
          (!cl.email && c.given_name === (cl.nombre || '').split(' ')[0] && c.family_name === (cl.nombre || '').split(' ').slice(1).join(' '))
        );
        if (existingCustomer) {
          squareCustomerId = existingCustomer.id;
        } else {
          const nameParts = (cl.nombre || 'Cliente').split(' ');
          const createRes = await SQ('/customers', 'POST', {
            given_name: nameParts[0] || cl.nombre,
            family_name: nameParts.slice(1).join(' ') || undefined,
            email_address: cl.email || undefined,
            phone_number: cl.telefono || undefined,
            company_name: cl.empresa || undefined,
            idempotency_key: `craftcrm-cust-${cl.id || Date.now()}`
          });
          const createData = await createRes.json();
          squareCustomerId = createData.customer?.id;
        }
      } catch(e) { /* customer creation optional */ }
    }

    // Step 2: Create Square Order
    const lineItems = OF.lines.map(l => ({
      name: l.prod_nombre || 'Producto',
      quantity: String(l.qty || 1),
      base_price_money: {
        amount: Math.round((parseFloat(l.price) || 0) * 100),
        currency: sqCurrency
      },
      note: l.notas_linea || undefined
    }));

    // Add discount if any
    const discounts = [];
    if ((OF.descuento_pct || 0) > 0) {
      discounts.push({
        name: `Descuento ${OF.descuento_pct}%`,
        percentage: String(OF.descuento_pct),
        scope: 'ORDER'
      });
    }

    // Add tax if IVA enabled
    const taxes = [];
    if (OF.iva) {
      const taxLabel = getActiveTaxLabel();
      const taxRate = getActiveTaxRate();
      if (taxRate > 0) {
        taxes.push({ name: taxLabel, percentage: String(taxRate), scope: 'ORDER' });
      }
    }

    const orderPayload = {
      idempotency_key: `craftcrm-ord-${OF.id || Date.now()}`,
      order: {
        location_id: sqLocationId,
        reference_id: orderNum,
        customer_id: squareCustomerId || undefined,
        line_items: lineItems,
        discounts: discounts.length ? discounts : undefined,
        taxes: taxes.length ? taxes : undefined,
      }
    };

    const orderRes = await SQ('/orders', 'POST', orderPayload);
    const orderData = await orderRes.json();

    if (!orderRes.ok || orderData.errors) {
      const errMsg = orderData.errors?.[0]?.detail || orderData.errors?.[0]?.code || 'Error al crear orden';
      throw new Error(errMsg);
    }

    const sqOrderId = orderData.order?.id;

    // Step 3: Create Invoice linked to the order
    const dueDate = OF.fecha_entrega || new Date(Date.now() + 7 * 86400000).toISOString().split('T')[0];
    const invoicePayload = {
      idempotency_key: `craftcrm-inv-${OF.id || Date.now()}`,
      invoice: {
        location_id: sqLocationId,
        order_id: sqOrderId,
        primary_recipient: squareCustomerId ? { customer_id: squareCustomerId } : undefined,
        payment_requests: [{
          request_type: 'BALANCE',
          due_date: dueDate,
          automatic_payment_source: 'NONE'
        }],
        delivery_method: 'EMAIL',
        invoice_number: orderNum,
        title: `Orden ${orderNum}`,
        description: OF.notas || `Factura generada desde CraftCRM`,
        sale_or_service_date: new Date().toISOString().split('T')[0],
        store_payment_method_enabled: false,
        accepted_payment_methods: {
          card: true,
          square_gift_card: false,
          bank_account: false,
          buy_now_pay_later: false,
          cash_app_pay: false
        }
      }
    };

    const invRes = await SQ('/invoices', 'POST', invoicePayload);
    const invData = await invRes.json();

    if (!invRes.ok || invData.errors) {
      const errMsg = invData.errors?.[0]?.detail || invData.errors?.[0]?.code || 'Error al crear factura';
      throw new Error(errMsg);
    }

    const invoiceId = invData.invoice?.id;
    const invoiceUrl = invData.invoice?.public_url;

    showStatus(`✓ Factura creada en Square — ID: ${invoiceId}`, false);
    if (confirmBtn) { confirmBtn.textContent = '✓ Creada'; confirmBtn.style.background = 'var(--green)'; }

    // Show success actions
    const actionsDiv = document.createElement('div');
    actionsDiv.style.cssText = 'display:flex;gap:8px;margin-top:10px;flex-wrap:wrap';
    if (invoiceUrl) {
      const openBtn = document.createElement('button');
      openBtn.className = 'btn btn-acc';
      openBtn.style.cssText = 'flex:1;justify-content:center;font-size:12px;background:#006aff';
      openBtn.innerHTML = '🔗 Ver factura en Square';
      openBtn.onclick = () => window.open(invoiceUrl, '_blank');
      actionsDiv.appendChild(openBtn);
    }
    const dashBtn = document.createElement('button');
    dashBtn.className = 'btn btn-ghost';
    dashBtn.style.cssText = 'flex:1;justify-content:center;font-size:12px';
    dashBtn.innerHTML = 'Ir al Dashboard Square';
    dashBtn.onclick = () => window.open('https://squareup.com/dashboard/invoices', '_blank');
    actionsDiv.appendChild(dashBtn);
    document.getElementById('sq-status')?.after(actionsDiv);

  } catch (err) {
    showStatus(`Error: ${err.message}`, true);
    if (confirmBtn) { confirmBtn.disabled = false; confirmBtn.textContent = 'Reintentar'; }
  }
}

// ════════════════════════════════════════════════════════
//  SQUARE — IMPORT CUSTOMERS
// ════════════════════════════════════════════════════════
async function squareImportCustomers() {
  const sqLocationId = localStorage.getItem('sq_location_id') || '';
  if (!sqLocationId) { showSquareSetupModal(); return; }

  const btn = document.getElementById('sq-import-btn');
  const statusEl = document.getElementById('sq-settings-status');
  const showSt = (msg, color) => {
    if (!statusEl) return;
    statusEl.style.display = 'block';
    statusEl.style.background = color === 'ok' ? 'var(--c2-dim)' : color === 'err' ? 'var(--red-dim)' : 'var(--s3)';
    statusEl.style.border = `1px solid ${color === 'ok' ? 'rgba(61,220,132,.3)' : color === 'err' ? 'rgba(255,69,69,.3)' : 'var(--border2)'}`;
    statusEl.style.color = color === 'ok' ? 'var(--c2)' : color === 'err' ? '#ff9999' : 'var(--t2)';
    statusEl.innerHTML = msg;
  };

  if (btn) { btn.disabled = true; btn.textContent = 'Importando...'; }
  showSt('⏳ Consultando clientes en Square...', 'info');

  const SQ = (path, method='GET', body) => fetch(`/api/square/v2${path}`, {
    method,
    headers: { 'Content-Type': 'application/json' },
    body: body ? JSON.stringify(body) : undefined,
  });

  try {
    // Fetch all customers from Square (paginated)
    let allCustomers = [];
    let cursor = null;
    do {
      const params = new URLSearchParams({ limit: '100' });
      if (cursor) params.set('cursor', cursor);
      const res = await SQ(`/customers?${params}`);
      const data = await res.json();
      if (!res.ok || data.errors) throw new Error(data.errors?.[0]?.detail || 'Error al obtener clientes');
      if (data.customers?.length) allCustomers = allCustomers.concat(data.customers);
      cursor = data.cursor || null;
    } while (cursor);

    if (!allCustomers.length) {
      showSt('ℹ Square no tiene clientes registrados aún.', 'info');
      if (btn) { btn.disabled = false; btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="13" height="13"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg> Importar clientes de Square'; }
      return;
    }

    // Build email set from existing local clients for dedup
    const localEmails = new Set(DATA.clientes.map(c => (c.email || '').toLowerCase().trim()).filter(Boolean));

    let imported = 0, skipped = 0, errors = 0;

    for (const sc of allCustomers) {
      const email = (sc.email_address || '').toLowerCase().trim();
      const nombre = [sc.given_name, sc.family_name].filter(Boolean).join(' ').trim()
        || sc.company_name || sc.id;

      // Skip duplicates by email
      if (email && localEmails.has(email)) { skipped++; continue; }

      try {
        const payload = {
          nombre,
          empresa: sc.company_name || '',
          email: sc.email_address || '',
          telefono: sc.phone_number || '',
          notas: `Importado de Square — ID: ${sc.id}${sc.note ? '\n'+sc.note : ''}`,
          square_customer_id: sc.id,
        };
        const result = await sb('clientes', '', 'POST', payload);
        if (result && result[0]) {
          DATA.clientes.push(result[0]);
          if (email) localEmails.add(email);
          imported++;
        }
      } catch(e) { errors++; }
    }

    showSt(
      `✓ Importación completada — <strong>${imported} clientes nuevos</strong> importados` +
      (skipped ? `, ${skipped} omitidos (ya existían)` : '') +
      (errors ? `, <span style="color:var(--amber)">${errors} con error</span>` : ''),
      'ok'
    );
    toast(`✓ ${imported} clientes importados de Square`);
  } catch(err) {
    showSt(`✗ Error: ${err.message}`, 'err');
  } finally {
    if (btn) { btn.disabled = false; btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="13" height="13"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg> Importar clientes de Square'; }
  }
}

// ════════════════════════════════════════════════════════
//  SQUARE — SYNC INVOICES → CRM ORDERS
// ════════════════════════════════════════════════════════
async function squareSyncInvoices() {
  const sqLocationId = localStorage.getItem('sq_location_id') || '';
  if (!sqLocationId) { showSquareSetupModal(); return; }

  const btn = document.getElementById('sq-sync-btn');
  const statusEl = document.getElementById('sq-settings-status');
  const showSt = (msg, color) => {
    if (!statusEl) return;
    statusEl.style.display = 'block';
    statusEl.style.background = color === 'ok' ? 'var(--c2-dim)' : color === 'err' ? 'var(--red-dim)' : 'var(--s3)';
    statusEl.style.border = `1px solid ${color === 'ok' ? 'rgba(61,220,132,.3)' : color === 'err' ? 'rgba(255,69,69,.3)' : 'var(--border2)'}`;
    statusEl.style.color = color === 'ok' ? 'var(--c2)' : color === 'err' ? '#ff9999' : 'var(--t2)';
    statusEl.innerHTML = msg;
  };

  if (btn) { btn.disabled = true; btn.textContent = 'Sincronizando...'; }
  showSt('⏳ Consultando facturas en Square...', 'info');

  const SQ = (path, method='GET', body) => fetch(`/api/square/v2${path}`, {
    method,
    headers: { 'Content-Type': 'application/json' },
    body: body ? JSON.stringify(body) : undefined,
  });

  // Map Square invoice status → CRM order status
  const STATUS_MAP = {
    'PAID':           'entregada',
    'PAYMENT_PENDING':'confirmada',
    'APPROVED':       'confirmada',
    'SCHEDULED':      'confirmada',
    'PARTIALLY_PAID': 'en_produccion',
    'CANCELED':       'cancelada',
    'FAILED':         'cancelada',
    'DRAFT':          null, // no change
    'UNPAID':         null, // no change
  };

  try {
    // Fetch invoices for this location (last 200)
    const body = {
      location_id: sqLocationId,
      limit: 200,
    };
    const res = await SQ('/invoices/search', 'POST', {
      query: {
        filter: { location_ids: [sqLocationId] },
        sort: { field: 'INVOICE_SORT_DATE', order: 'DESC' },
      },
      limit: 200,
    });
    const data = await res.json();
    if (!res.ok || data.errors) throw new Error(data.errors?.[0]?.detail || 'Error al obtener facturas');

    const invoices = data.invoices || [];
    if (!invoices.length) {
      showSt('ℹ No se encontraron facturas en Square para esta ubicación.', 'info');
      return;
    }

    let updated = 0, noMatch = 0, noChange = 0;
    const log = [];

    for (const inv of invoices) {
      const sqStatus = inv.status;
      const newStatus = STATUS_MAP[sqStatus];

      // Try to match by invoice_number → orden.numero
      const invNum = inv.invoice_number || '';
      const localOrd = invNum ? DATA.ordenes.find(o =>
        o.numero === invNum ||
        o.numero === `ORD-${invNum}` ||
        invNum === `ORD-${o.numero}`
      ) : null;

      if (!localOrd) { noMatch++; continue; }
      if (!newStatus || localOrd.status === newStatus) { noChange++; continue; }

      // Update order status in Supabase
      try {
        await sb('ordenes', `id=eq.${localOrd.id}`, 'PATCH', { status: newStatus });
        localOrd.status = newStatus;
        updated++;
        log.push(`${invNum}: ${sqStatus} → <strong>${newStatus}</strong>`);
      } catch(e) { /* continue */ }
    }

    const summary = `✓ Sync completado — <strong>${updated} orden${updated !== 1 ? 'es' : ''} actualizada${updated !== 1 ? 's' : ''}</strong>` +
      (noChange ? `, ${noChange} sin cambios` : '') +
      (noMatch ? `, ${noMatch} sin coincidencia local` : '');

    showSt(
      summary + (log.length ? `<div style="margin-top:8px;font-size:10px;color:var(--t3);line-height:1.8">${log.slice(0, 10).join('<br>')}</div>` : ''),
      'ok'
    );
    if (updated > 0) {
      toast(`✓ ${updated} orden${updated !== 1 ? 'es' : ''} sincronizada${updated !== 1 ? 's' : ''} con Square`);
      // Refresh current page if showing orders
      if (['ordenes','home','kanban'].includes(curPage)) navigate(curPage);
    } else {
      toast('Square — todo al día ✓');
    }
  } catch(err) {
    showSt(`✗ Error: ${err.message}`, 'err');
  } finally {
    if (btn) { btn.disabled = false; btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="13" height="13"><path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/></svg> Sync facturas Square → CRM'; }
  }
}
