<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#080808">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="/manifest.json">
<title id="page-title">CraftCRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}

/* ══ THEME SYSTEM ══ */
:root{
  --bg:#080808; --s1:#0f0f0f; --s2:#151515; --s3:#1a1a1a; --s4:#202020;
  --border:#1e1e1e; --border2:#2a2a2a; --border3:#333;
  --t1:#efefef; --t2:#888; --t3:#4a4a4a;
  --shadow:0 4px 24px rgba(0,0,0,0.45); --shadow2:0 8px 32px rgba(0,0,0,0.6);
  /* 5-color palette */
  --c1:#d4ff47; --c2:#3ddc84; --c3:#ff6b35; --c4:#4d94ff; --c5:#efefef;
  --c1-rgb:212,255,71;
  --c1-dim:rgba(212,255,71,0.08); --c1-dim2:rgba(212,255,71,0.14);
  --c2-dim:rgba(61,220,132,0.1); --c3-dim:rgba(255,107,53,0.1); --c4-dim:rgba(77,148,255,0.1);
  /* Legacy aliases */
  --acc:#d4ff47; --acc-rgb:212,255,71;
  --acc-dim:rgba(212,255,71,0.08); --acc-dim2:rgba(212,255,71,0.14);
  --red:#ff4545; --red-dim:rgba(255,69,69,0.1);
  --green:#3ddc84; --amber:#ff6b35; --blue:#4d94ff;
  --delivered-paid:#1a5c32; --delivered-paid-dim:rgba(26,92,50,0.18); --delivered-paid-bright:#2a8c4e;
  --delivered-unpaid:#3ddc84; --delivered-unpaid-dim:rgba(61,220,132,0.15);
  --archived:#3a3a3a; --archived-dim:rgba(80,80,80,0.12);
  --r:8px; --r2:5px;
  --sidebar-w:52px;
}
[data-theme="midnight"]{
  --bg:#03060f; --s1:#080d1a; --s2:#0d1324; --s3:#12192e; --s4:#182038;
  --border:#151f38; --border2:#1e2f52; --border3:#2a4070;
  --t1:#e8eeff; --t2:#7a90c0; --t3:#3a4a70;
  --c1:#7c6aff; --c2:#00d4ff; --c3:#ff4db8; --c4:#3ddc84; --c5:#e8eeff;
  --c1-rgb:124,106,255; --c1-dim:rgba(124,106,255,0.1); --c1-dim2:rgba(124,106,255,0.18);
  --c2-dim:rgba(0,212,255,0.1); --c3-dim:rgba(255,77,184,0.1); --c4-dim:rgba(61,220,132,0.1);
  --acc:#7c6aff; --acc-rgb:124,106,255; --acc-dim:rgba(124,106,255,0.1); --acc-dim2:rgba(124,106,255,0.18);
  --green:#00d4ff; --amber:#ff4db8; --blue:#3ddc84;
  --shadow:0 4px 24px rgba(0,0,0,0.6); --shadow2:0 8px 40px rgba(0,0,0,0.8);
}
[data-theme="ember"]{
  --bg:#0d0805; --s1:#160f09; --s2:#1e150d; --s3:#261b13; --s4:#2e2218;
  --border:#221a10; --border2:#332614; --border3:#44331c;
  --t1:#f5ecd8; --t2:#a08060; --t3:#5a4030;
  --c1:#ff6b35; --c2:#ffd43b; --c3:#ff4545; --c4:#d4ff47; --c5:#f5ecd8;
  --c1-rgb:255,107,53; --c1-dim:rgba(255,107,53,0.1); --c1-dim2:rgba(255,107,53,0.18);
  --c2-dim:rgba(255,212,59,0.1); --c3-dim:rgba(255,69,69,0.1); --c4-dim:rgba(212,255,71,0.1);
  --acc:#ff6b35; --acc-rgb:255,107,53; --acc-dim:rgba(255,107,53,0.1); --acc-dim2:rgba(255,107,53,0.18);
  --green:#ffd43b; --amber:#ff4545; --blue:#d4ff47;
  --shadow:0 4px 24px rgba(0,0,0,0.5); --shadow2:0 8px 36px rgba(0,0,0,0.7);
}
[data-theme="slate"]{
  /* Warm white backgrounds — slight cream tint, feels premium not sterile */
  --bg:#f7f6f3; --s1:#ffffff; --s2:#f0eeea; --s3:#e8e5e0; --s4:#dedad4;
  --border:#e2dfd9; --border2:#ccc9c2; --border3:#aaa8a0;

  /* Text — deep warm charcoal, not pure black */
  --t1:#1c1a17; --t2:#6b6760; --t3:#a8a49c;

  /* Accent — indigo with good contrast on white, modern & confident */
  --acc:#4f46e5; --acc-rgb:79,70,229;
  --acc-dim:rgba(79,70,229,0.08); --acc-dim2:rgba(79,70,229,0.14);

  /* Status colors — slightly richer on light bg */
  --c1:#4f46e5; --c1-rgb:79,70,229; --c1-dim:rgba(79,70,229,0.1); --c1-dim2:rgba(79,70,229,0.18);
  --c2:#16a34a; --c2-dim:rgba(22,163,74,0.12);
  --c3:#ea580c; --c3-dim:rgba(234,88,12,0.12);
  --c4:#2563eb; --c4-dim:rgba(37,99,235,0.12);
  --c5:#7c3aed;

  /* Semantic colors */
  --red:#dc2626; --red-dim:rgba(220,38,38,0.09);
  --green:#16a34a; --amber:#d97706; --blue:#2563eb;

  --shadow:0 1px 8px rgba(0,0,0,0.08); --shadow2:0 6px 24px rgba(0,0,0,0.12);
}

/* Light theme overrides — btn-acc needs white text on indigo */
[data-theme="slate"] .btn-acc { color: #ffffff !important; }
[data-theme="slate"] .mc-day.sel { color: #ffffff !important; }
[data-theme="slate"] .stat { background: var(--s1); }
[data-theme="slate"] .card { background: var(--s1); }
[data-theme="slate"] .modal { background: var(--s1); }
[data-theme="slate"] .lp-item:hover { background: var(--s2); }
[data-theme="slate"] .ctx-item:hover { background: var(--s2); }
[data-theme="slate"] .inp { background: var(--s1); border-color: var(--border2); }
[data-theme="slate"] .inp:focus { border-color: var(--acc); box-shadow: 0 0 0 3px rgba(79,70,229,0.12); }
[data-theme="slate"] .btn-ghost { border-color: var(--border2); color: var(--t2); }
[data-theme="slate"] .btn-ghost:hover { background: var(--s2); color: var(--t1); border-color: var(--border3); }
[data-theme="slate"] .kanban-card { background: var(--s1); }
[data-theme="slate"] .taller-col { background: var(--s1) !important; }
[data-theme="slate"] .tc { background: var(--s2); }
[data-theme="slate"] .order-row:hover { background: var(--s2); }
[data-theme="slate"] .lp-item.selected, [data-theme="slate"] .lp-item.active { background: var(--acc-dim2); }
[data-theme="slate"] .rb.on { background: var(--acc-dim2); color: var(--acc); }
[data-theme="slate"] .dash-card { background: var(--s1); }
[data-theme="slate"] .cobro-row { background: rgba(217,119,6,0.06); }
[data-theme="slate"] .urg-row { background: var(--s1); }

html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:'DM Sans',sans-serif;color:var(--t1);-webkit-font-smoothing:antialiased;transition:background .25s,color .25s;}
input,select,textarea,button{font-family:inherit;}
button{cursor:pointer;}

/* ══ LAYOUT ══ */
#app{display:flex;height:100vh;overflow:hidden;}

/* Sidebar — mobile: 52px icon strip, desktop: 200px with labels */
#rail{
  width:var(--sidebar-w);background:var(--s1);border-right:1px solid var(--border);
  display:flex;flex-direction:column;align-items:center;padding:10px 0;gap:2px;
  flex-shrink:0;z-index:20;overflow:hidden;
  transition:width .25s cubic-bezier(.4,0,.2,1),background .25s;
}
@media(min-width:1024px){
  :root{--sidebar-w:200px;}
  #rail{align-items:flex-start;padding:12px 0;}
}

/* Desktop 3-column area */
#main-area{flex:1;display:flex;overflow:hidden;}

/* List panel */
#list-panel{
  display:none;width:260px;flex-shrink:0;
  background:var(--s1);border-right:1px solid var(--border);
  flex-direction:column;overflow:hidden;
}
@media(min-width:1024px){#list-panel.lp-active{display:flex;}}

.lp-head{padding:14px 14px 10px;border-bottom:1px solid var(--border);flex-shrink:0;}
.lp-title{font-size:13px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.lp-search-wrap{position:relative;}
.lp-search-wrap svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);width:12px;height:12px;color:var(--t3);pointer-events:none;}
.lp-search{width:100%;padding:7px 10px 7px 28px;background:var(--s2);border:1px solid var(--border2);border-radius:var(--r2);color:var(--t1);font-size:12px;outline:none;}
.lp-search:focus{border-color:var(--border3);}
.lp-search::placeholder{color:var(--t3);}
.lp-filters{display:flex;gap:3px;margin-top:7px;flex-wrap:wrap;}
.lpf{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;background:var(--s3);color:var(--t3);border:none;cursor:pointer;transition:all .1s;text-transform:uppercase;letter-spacing:.04em;}
.lpf:hover{color:var(--t2);}
.lpf.on{background:var(--acc-dim2);color:var(--acc);}
.lp-body{flex:1;overflow-y:auto;padding:6px;}
.lp-body::-webkit-scrollbar{width:3px;}
.lp-body::-webkit-scrollbar-thumb{background:var(--s4);border-radius:3px;}
.lp-item{display:flex;align-items:center;gap:8px;padding:9px 10px;border:1px solid transparent;border-left-width:3px;border-radius:6px;cursor:pointer;transition:all .1s;margin-bottom:2px;}
.lp-item:hover{background:var(--s2);border-color:var(--border);border-left-width:3px;}
.lp-item.selected{background:var(--acc-dim);border-color:rgba(212,255,71,.2);border-left-width:3px;}
.lp-item-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.lp-item-body{flex:1;min-width:0;}
.lp-item-num{font-size:10px;font-weight:700;font-family:'DM Mono',monospace;color:var(--t2);}
.lp-item-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lp-item-meta{font-size:10px;color:var(--t3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lp-item-amt{font-size:11px;font-weight:700;font-family:'DM Mono',monospace;color:var(--t2);flex-shrink:0;}

/* Content panel */
#content-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}

/* Context topbar */
#ctx-bar{
  display:none;height:44px;flex-shrink:0;
  background:var(--s1);border-bottom:1px solid var(--border);
  align-items:center;padding:0 16px;gap:10px;
}
@media(min-width:1024px){#ctx-bar{display:flex;}}
.ctx-bc{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--t3);}
.ctx-bc .sep{color:var(--border3);}
.ctx-bc .cur{color:var(--t1);}
.ctx-pill{padding:3px 10px;border-radius:20px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;}

/* Main scroll */
#main{flex:1;overflow:auto;position:relative;}
#main::-webkit-scrollbar{width:4px;}
#main::-webkit-scrollbar-track{background:transparent;}
#main::-webkit-scrollbar-thumb{background:var(--s4);border-radius:4px;}

/* ── Lock screen ── */
#lock-screen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px;}
.lock-box{max-width:300px;width:100%;text-align:center;}
.lock-logo{width:52px;height:52px;background:var(--c1);border-radius:12px;margin:0 auto 18px;display:flex;align-items:center;justify-content:center;}
.lock-logo svg{width:26px;height:26px;}
.lock-title{font-size:19px;font-weight:700;margin-bottom:4px;letter-spacing:-.02em;}
.lock-sub{font-size:12px;color:var(--t3);margin-bottom:22px;}
.pin-dots{display:flex;gap:10px;justify-content:center;margin-bottom:18px;}
.pin-dot{width:13px;height:13px;border-radius:50%;border:2px solid var(--border3);transition:all .15s;}
.pin-dot.filled{background:var(--c1);border-color:var(--c1);}
.pin-dot.error{background:var(--red);border-color:var(--red);animation:shake .3s;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.pin-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:210px;margin:0 auto 12px;}
.pin-key{height:50px;background:var(--s2);border:1px solid var(--border2);border-radius:10px;font-size:17px;font-weight:600;color:var(--t1);cursor:pointer;transition:all .1s;display:flex;align-items:center;justify-content:center;}
.pin-key:hover{background:var(--s3);border-color:var(--border3);}
.pin-key:active{transform:scale(.94);background:var(--c1-dim2);}
.pin-key.del{font-size:13px;color:var(--t2);}

/* Detail panel */
#detail-panel{
  display:none;width:260px;flex-shrink:0;
  background:var(--s1);border-left:1px solid var(--border);
  flex-direction:column;overflow:hidden;
}
@media(min-width:1024px){#detail-panel.dp-active{display:flex;}}
.dp-head{padding:12px 14px 10px;border-bottom:1px solid var(--border);flex-shrink:0;}
.dp-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);}
.dp-body{flex:1;overflow-y:auto;padding:10px 14px;}
.dp-body::-webkit-scrollbar{width:3px;}
.dp-body::-webkit-scrollbar-thumb{background:var(--s4);border-radius:3px;}
.dp-section{margin-bottom:16px;}
.dp-section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);margin-bottom:8px;}
.dp-avatar{width:36px;height:36px;border-radius:50%;background:var(--acc-dim2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--acc);flex-shrink:0;}
.dp-row{margin-bottom:6px;}
.dp-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--t3);margin-bottom:2px;}
.dp-value{font-size:12px;color:var(--t1);}
.dp-ord{display:flex;align-items:center;gap:8px;padding:7px 8px;background:var(--s2);border:1px solid var(--border);border-radius:5px;margin-bottom:3px;cursor:pointer;transition:border-color .1s;}
.dp-ord:hover{border-color:var(--border3);}
.dp-ord-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.dp-ord-num{font-size:10px;font-weight:700;font-family:'DM Mono',monospace;color:var(--t2);}
.dp-ord-total{font-size:11px;font-weight:700;font-family:'DM Mono',monospace;margin-left:auto;color:var(--t1);}

/* ══ RAIL ══ */
.rl{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;flex-shrink:0;overflow:hidden;cursor:pointer;}
.rl img{width:100%;height:100%;object-fit:cover;}
.rl-text{font-size:12px;font-weight:800;color:#080808;}
.rb{
  width:34px;height:34px;background:transparent;border:none;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  color:var(--t3);transition:all 0.1s;position:relative;flex-shrink:0;
}
.rb:hover{background:var(--s3);color:var(--t2);}
.rb.on{background:var(--acc-dim2);color:var(--acc);}
.rb svg{width:15px;height:15px;stroke-width:1.7;flex-shrink:0;}
.rb .tip{position:absolute;left:42px;top:50%;transform:translateY(-50%);background:var(--s4);border:1px solid var(--border3);color:var(--t1);font-size:11px;font-weight:600;padding:4px 9px;border-radius:5px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity 0.1s;z-index:300;}
.rb:hover .tip{opacity:1;}
/* Desktop rail expansion */
.rb-label{display:none;font-size:12px;font-weight:600;color:inherit;white-space:nowrap;}
@media(min-width:1024px){
  .rl{width:36px;height:36px;margin:0 0 20px 12px;}
  .rb{width:calc(100% - 24px);height:36px;margin:0 12px;justify-content:flex-start;padding:0 10px;gap:10px;border-radius:6px;}
  .rb .tip{display:none;}
  .rb-label{display:block;}
  .rsep{width:calc(100% - 24px);margin:6px 12px;}
  .rdot{margin-left:14px;}
}
.rsep{width:20px;height:1px;background:var(--border);margin:4px auto;}
.rdot{width:6px;height:6px;border-radius:50%;margin-top:auto;margin-bottom:6px;background:var(--red);transition:background 0.3s;flex-shrink:0;}
.rdot.ok{background:var(--green);}

/* ══ INPUTS ══ */
.inp{width:100%;padding:8px 11px;background:var(--s2);border:1px solid var(--border2);border-radius:var(--r2);color:var(--t1);font-size:13px;outline:none;transition:border-color 0.12s,background .25s;}
.inp:focus{border-color:var(--border3);background:var(--s3);}
.inp::placeholder{color:var(--t3);}
select.inp{cursor:pointer;}
select.inp option{background:var(--s2);color:var(--t1);}
textarea.inp{resize:vertical;min-height:56px;line-height:1.5;}

/* ══ BUTTONS ══ */
.btn{padding:8px 16px;border:none;border-radius:var(--r2);font-size:13px;font-weight:600;transition:all 0.1s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
.btn-acc{background:var(--acc);color:#080808;}
.btn-acc:hover{filter:brightness(0.9);}
.btn-acc:disabled{opacity:0.35;cursor:default;}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--t2);padding:7px 13px;font-size:12px;}
.btn-ghost:hover{border-color:var(--border3);color:var(--t1);}
.btn-icon{background:transparent;border:none;padding:4px;border-radius:3px;color:var(--t3);line-height:1;transition:color 0.1s;display:flex;align-items:center;justify-content:center;}
.btn-icon:hover{color:var(--t1);}
.btn-icon.del:hover{color:var(--red);}
.btn-icon svg{width:13px;height:13px;}

/* ══ PAGE ══ */
.page{padding:22px 26px;}
.page-sm{max-width:660px;}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px;}
.ptitle{font-size:17px;font-weight:700;letter-spacing:-0.02em;}
.back-btn{display:inline-flex;align-items:center;gap:5px;color:var(--t3);font-size:11px;font-weight:600;border:none;background:none;padding:0 0 14px;transition:color 0.1s;}
.back-btn:hover{color:var(--t1);}
.back-btn svg{width:13px;height:13px;}
.lbl{font-size:10px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px;}
.fld{margin-bottom:12px;}
.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:14px;transition:background .25s,border-color .25s;}
.card+.card{margin-top:8px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}

/* ══ HOME ══ */
.home-btn{width:100%;display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--acc);color:#080808;border:none;border-radius:var(--r);font-family:inherit;font-size:14px;font-weight:700;margin-bottom:20px;transition:filter 0.1s;cursor:pointer;}
.home-btn:hover{filter:brightness(0.9);}
.home-btn svg{width:18px;height:18px;}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px;}
.stat{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:14px;transition:background .25s;}
.stat-val{font-size:20px;font-weight:700;}
.stat-key{font-size:10px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:0.04em;margin-top:2px;}
.order-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:var(--r2);cursor:pointer;transition:all 0.15s;background:var(--s1);margin-bottom:4px;border-left-width:3px;}
.order-row:hover{border-color:var(--border3);}
.order-row.or-done{background:rgba(15,30,20,0.55);border-color:rgba(26,92,50,0.18);border-left-color:#1a5c32!important;opacity:0.62;filter:saturate(0.4);}
.order-row.or-done:hover{opacity:0.85;filter:saturate(0.7);}
.order-row.or-cobro{background:rgba(18,46,30,0.45);border-color:rgba(61,220,132,0.35);border-left-color:#3ddc84!important;animation:cobro-pulse 2.4s ease-in-out infinite;}
.order-row.or-cobro:hover{animation:none;border-color:#3ddc84;}
@keyframes cobro-pulse{0%,100%{border-left-color:#3ddc84;box-shadow:none}50%{border-left-color:#5fffa0;box-shadow:inset 2px 0 8px rgba(61,220,132,0.18)}}
.lp-item.lp-done{opacity:0.5;filter:saturate(0.3);}
.lp-item.lp-done:hover{opacity:0.8;filter:saturate(0.6);}
.lp-item.lp-cobro{background:rgba(18,46,30,0.35);border-left-color:#3ddc84!important;}
.lp-item.lp-cobro .lp-item-name{color:#3ddc84;}
.opip{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.onum{font-size:12px;font-weight:700;font-family:'DM Mono',monospace;}
.ometa{font-size:11px;color:var(--t3);}
.list-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:var(--r2);cursor:pointer;transition:border-color 0.1s;background:var(--s1);margin-bottom:4px;}
.list-row:hover{border-color:var(--border3);}

/* ══ ORDER FORM ══ */
.of-wrap{padding:20px 26px;max-width:680px;}
.of-head{display:flex;align-items:baseline;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
.of-num{font-family:'DM Mono',monospace;font-size:11px;color:var(--t3);background:var(--s2);padding:2px 7px;border-radius:4px;}

/* AUTOCOMPLETE */
.ac-wrap{position:relative;}
.ac-input{width:100%;padding:9px 12px;background:transparent;border:none;border-bottom:1.5px solid var(--border3);color:var(--t1);font-size:15px;font-weight:500;outline:none;transition:border-color 0.12s;}
.ac-input:focus{border-bottom-color:var(--acc);}
.ac-input::placeholder{color:var(--t3);font-weight:400;font-size:14px;}
.ac-drop{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--s3);border:1px solid var(--border3);border-radius:var(--r);box-shadow:var(--shadow2);z-index:150;overflow:hidden;display:none;max-height:280px;overflow-y:auto;}
.ac-drop.open{display:block;}
.ac-item{padding:9px 12px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:8px;transition:background 0.08s;}
.ac-item:hover,.ac-item.hi{background:var(--s4);}
.ac-item.hi{background:var(--acc-dim);}
.ac-item-name{font-weight:600;}
.ac-item-sub{font-size:11px;color:var(--t3);margin-top:1px;}
.ac-badge{font-size:10px;padding:2px 6px;border-radius:3px;font-weight:700;background:var(--s4);color:var(--t3);white-space:nowrap;margin-left:auto;}
.ac-new{border-top:1px solid var(--border2);padding:9px 12px;cursor:pointer;font-size:12px;color:var(--acc);font-weight:600;display:flex;align-items:center;gap:6px;transition:background 0.08s;}
.ac-new:hover,.ac-new.hi{background:var(--acc-dim);}
.ac-hint{padding:8px 12px;font-size:11px;color:var(--t3);font-style:italic;}
.client-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 10px 5px 8px;background:var(--acc-dim);border:1px solid var(--acc);border-radius:20px;font-size:13px;font-weight:600;color:var(--acc);}
.client-chip svg{width:12px;height:12px;}
.client-chip button{background:none;border:none;color:var(--acc);font-size:16px;line-height:1;padding:0 0 0 2px;opacity:0.5;cursor:pointer;transition:opacity .1s;}
.client-chip button:hover{opacity:1;}

/* ══ LINE CARDS — polymorphic multiplier UI ══ */
.line-card{
  background:var(--s2);border:1px solid var(--border);border-radius:var(--r);
  padding:10px 12px;margin-bottom:6px;transition:border-color .1s;
}
.line-card:hover{border-color:var(--border2);}
.line-card-top{
  display:flex;align-items:center;gap:8px;margin-bottom:8px;
}
.line-card-info{flex:1;min-width:0;}
.line-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.line-cat-badge{
  display:inline-block;font-size:9px;font-weight:700;text-transform:uppercase;
  letter-spacing:.04em;padding:1px 5px;border-radius:3px;margin-top:2px;
  background:var(--acc-dim);color:var(--acc);
}
/* Multiplier selector pills */
.mul-btns{display:flex;gap:2px;}
.mul-btn{
  width:24px;height:24px;border:1px solid var(--border2);border-radius:4px;
  background:transparent;color:var(--t3);font-size:12px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .1s;
}
.mul-btn:hover{border-color:var(--border3);color:var(--t2);}
.mul-btn.on{border-color:var(--acc);color:var(--acc);background:var(--acc-dim);}
/* Field group layout */
.line-card-fields{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;}
.lf-group{display:flex;flex-direction:column;gap:3px;flex:1;min-width:60px;}
.lf-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--t3);}
.lf-inp{
  width:100%;padding:5px 7px;background:var(--s3);border:1px solid var(--border2);
  border-radius:4px;color:var(--t1);font-size:12px;font-family:'DM Mono',monospace;
  outline:none;transition:border-color .1s;
}
.lf-inp:focus{border-color:var(--border3);}
select.lf-inp{cursor:pointer;}
/* Manual override field */
.lf-override{min-width:80px;max-width:110px;position:relative;}
.lf-subtotal{border-color:var(--border3)!important;font-weight:600;}
.lf-computed{
  position:absolute;top:100%;right:0;font-size:10px;font-weight:600;
  font-family:'DM Mono',monospace;margin-top:2px;white-space:nowrap;
}
/* Tier pills */
.tier-pill{
  padding:4px 10px;border:1px solid var(--border2);border-radius:5px;
  background:var(--s3);color:var(--t2);font-size:11px;font-weight:600;
  cursor:pointer;transition:all .1s;white-space:nowrap;
}
.tier-pill:hover{border-color:var(--border3);color:var(--t1);}
.tier-pill.active{border-color:var(--acc);color:var(--acc);background:var(--acc-dim);}
/* Remove old rigid table header */
.lines-hdr{display:none;}
.newline-row{padding:6px 6px 2px;}
.newline-inp{width:100%;background:transparent;border:none;border-bottom:1.5px dashed var(--border2);color:var(--t2);font-size:13px;outline:none;padding:5px 2px;transition:all 0.1s;}
.newline-inp:focus{border-bottom-color:var(--acc);color:var(--t1);}
.newline-inp::placeholder{color:var(--t3);}

/* TOTALS */
.totals-panel{margin-top:10px;background:var(--s2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.tot-row{display:flex;align-items:center;justify-content:space-between;padding:7px 14px;font-size:12px;color:var(--t2);}
.tot-row+.tot-row{border-top:1px solid var(--border);}
.tot-total{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;font-size:15px;font-weight:700;color:var(--t1);background:var(--s3);}
.iva-btn{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:3px;border:1px solid var(--border2);background:transparent;color:var(--t3);font-size:11px;font-weight:700;cursor:pointer;transition:all .1s;}
.iva-btn.on{border-color:var(--acc);color:var(--acc);background:var(--acc-dim);}
.disc-inp{width:46px;text-align:right;background:transparent;border:none;border-bottom:1px solid var(--border2);color:var(--t1);font-size:12px;font-family:'DM Mono',monospace;outline:none;padding:1px 0;}
.disc-inp:focus{border-bottom-color:var(--border3);}

/* PAYMENTS */
.pay-panel{margin-top:8px;background:var(--s2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.mp-btn{background:#009ee3;color:#fff;border:none;border-radius:var(--r2);padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:filter .1s;}
.mp-btn:hover{filter:brightness(1.1);}
.mp-link-box{background:var(--s3);border:1px solid var(--border2);border-radius:6px;padding:10px 12px;margin-top:8px;display:flex;align-items:center;gap:8px;}
.mp-link-url{flex:1;font-size:11px;font-family:'DM Mono',monospace;color:var(--t2);word-break:break-all;overflow:hidden;}
.pay-head{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;cursor:pointer;user-select:none;}
.pay-head-lbl{font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;display:flex;align-items:center;gap:7px;}
.pay-entry{display:flex;align-items:center;justify-content:space-between;padding:7px 14px;font-size:12px;border-top:1px solid var(--border);}
.pay-add{display:flex;gap:6px;align-items:center;padding:8px 14px;border-top:1px solid var(--border);flex-wrap:wrap;}
.pay-balance{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;font-size:13px;font-weight:700;border-top:1px solid var(--border);}
.pay-shortcuts{display:flex;gap:6px;padding:6px 14px;border-top:1px solid var(--border);flex-wrap:wrap;}

/* ══ MINI CALENDAR DATE PICKER ══ */
.date-picker-wrap{position:relative;}
.date-display{display:flex;align-items:center;gap:8px;padding:8px 11px;background:var(--s2);border:1px solid var(--border2);border-radius:var(--r2);cursor:pointer;transition:border-color .1s;font-size:12px;}
.date-display:hover{border-color:var(--border3);}
.date-display svg{width:13px;height:13px;color:var(--t3);flex-shrink:0;}
.date-display .date-val{flex:1;font-family:'DM Mono',monospace;}
.date-display .date-hint{font-size:10px;color:var(--t3);}
.mini-cal{position:absolute;top:calc(100% + 6px);left:0;z-index:200;background:var(--s3);border:1px solid var(--border3);border-radius:10px;box-shadow:var(--shadow2);padding:12px;width:260px;display:none;}
.mini-cal.open{display:block;}
.mc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.mc-month{font-size:12px;font-weight:700;}
.mc-nav{background:none;border:none;color:var(--t2);padding:2px 6px;border-radius:4px;font-size:14px;cursor:pointer;transition:color .1s;}
.mc-nav:hover{color:var(--t1);}
.mc-dow{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px;}
.mc-dow span{font-size:9px;color:var(--t3);font-weight:700;text-align:center;padding:2px 0;}
.mc-days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.mc-day{position:relative;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:5px;cursor:pointer;font-size:12px;font-weight:500;transition:background .1s,color .1s;}
.mc-day:hover{background:var(--s4);}
.mc-day.today{color:var(--acc);font-weight:700;}
.mc-day.sel{background:var(--acc);color:#080808;font-weight:700;}
.mc-day.sel:hover{background:var(--acc);}
.mc-day.other-month{color:var(--t3);}
.mc-day.past{opacity:0.4;}
.mc-dots{display:flex;gap:2px;position:absolute;bottom:2px;left:50%;transform:translateX(-50%);}
.mc-dot{width:4px;height:4px;border-radius:50%;}
.mc-dot.low{background:var(--green);}
.mc-dot.med{background:var(--amber);}
.mc-dot.high{background:var(--red);}

/* ══ CALENDAR PAGE ══ */
.cal-page{display:flex;flex-direction:column;height:100%;overflow:hidden;}
.cal-toolbar{display:flex;align-items:center;gap:10px;padding:16px 20px 12px;border-bottom:1px solid var(--border);flex-shrink:0;}
.cal-title{font-size:14px;font-weight:700;flex:1;}
.cal-grid-wrap{flex:1;overflow:auto;padding:12px 16px;}
.cal-week-hdr{display:grid;grid-template-columns:60px repeat(7,1fr);gap:4px;margin-bottom:4px;}
.cal-week-hdr span{font-size:10px;color:var(--t3);font-weight:700;text-transform:uppercase;text-align:center;padding:4px 0;}
.cal-row{display:grid;grid-template-columns:60px repeat(7,1fr);gap:4px;min-height:80px;margin-bottom:4px;}
.cal-time{font-size:10px;color:var(--t3);font-family:'DM Mono',monospace;text-align:right;padding-top:4px;}
.cal-cell{background:var(--s1);border:1px solid var(--border);border-radius:6px;padding:4px;min-height:80px;position:relative;transition:border-color .1s;}
.cal-cell.today-col{border-color:var(--acc);background:var(--acc-dim);}
.cal-cell.drag-over{border-color:var(--acc);background:var(--acc-dim2);}
.cal-date-num{font-size:11px;color:var(--t3);font-weight:600;margin-bottom:3px;}
.cal-card{padding:4px 6px;border-radius:4px;font-size:11px;font-weight:600;margin-bottom:3px;cursor:grab;user-select:none;overflow:hidden;transition:opacity .1s;line-height:1.3;}
.cal-card .cc-prod{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cal-card .cc-cl{font-size:9px;opacity:.8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.cal-card:active{cursor:grabbing;opacity:0.7;}
.cal-card.dragging{opacity:0.4;}
/* Month grid */
.cal-month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-month-cell{background:var(--s1);border:1px solid var(--border);border-radius:6px;padding:6px;min-height:130px;transition:border-color .1s;display:flex;flex-direction:column;}
.cal-month-cell.today-col{border-color:var(--acc);background:var(--acc-dim);}
.cal-month-cell.drag-over{border-color:var(--acc);background:var(--acc-dim2);}
.cal-month-date{font-size:11px;color:var(--t3);font-weight:600;margin-bottom:4px;}

/* ══ CONTEXT MENU ══ */
.ctx-item{display:flex;align-items:center;gap:8px;padding:8px 14px;font-size:12px;font-weight:500;cursor:pointer;transition:background .08s;color:var(--t1);}
.ctx-item:hover{background:var(--s4);}
.ctx-item svg{flex-shrink:0;color:var(--t3);}

/* ══ CATEGORY MANAGER ══ */
.cat-card{background:var(--s2);border:1px solid var(--border2);border-radius:var(--r);padding:12px;margin-bottom:6px;}
.cat-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.cat-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;}
.cat-name{font-size:13px;font-weight:600;flex:1;}
.inc-type-tabs{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:8px;}
.inc-tab{padding:4px 9px;border:1px solid var(--border2);border-radius:4px;background:transparent;font-size:10px;font-weight:700;color:var(--t3);cursor:pointer;transition:all .1s;}
.inc-tab.on{border-color:var(--acc);color:var(--acc);background:var(--acc-dim);}
.tiers-wrap{display:flex;flex-direction:column;gap:4px;}
.tier-row{display:grid;grid-template-columns:1fr 1fr 24px;gap:6px;align-items:center;}
.dim-row{display:grid;grid-template-columns:1fr 1fr 1fr 24px;gap:6px;align-items:center;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.72);z-index:500;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px);}
.modal{background:var(--s2);border:1px solid var(--border3);border-radius:12px;padding:22px;width:100%;max-width:400px;box-shadow:var(--shadow2);}
.modal-title{font-size:15px;font-weight:700;margin-bottom:4px;}
.modal-sub{font-size:12px;color:var(--t3);margin-bottom:16px;line-height:1.5;}

/* ══ KANBAN ══ */
.kanban-wrap{display:flex;gap:10px;height:calc(100vh - 60px);overflow-x:auto;padding:16px 20px;align-items:flex-start;}
.kanban-col{flex:0 0 210px;display:flex;flex-direction:column;background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.kanban-col-head{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1px solid var(--border);}
.kanban-col-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;}
.kanban-col-count{font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;background:var(--s3);}
.kanban-col-body{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px;min-height:100px;}
.kanban-card{background:var(--s2);border:1px solid var(--border);border-radius:6px;padding:9px 10px;cursor:pointer;transition:border-color .1s,box-shadow .1s;}
.kanban-card:hover{border-color:var(--border3);box-shadow:0 2px 8px rgba(0,0,0,.2);}
.kanban-card.drag-src{opacity:.4;transform:scale(.97);}
.kanban-card-num{font-size:10px;font-weight:700;font-family:'DM Mono',monospace;color:var(--t3);margin-bottom:3px;}
.kanban-card-client{font-size:12px;font-weight:600;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.kanban-card-meta{font-size:10px;color:var(--t3);display:flex;justify-content:space-between;align-items:center;}
.kanban-card-total{font-size:11px;font-weight:700;font-family:'DM Mono',monospace;}
.kanban-drop-zone{border-radius:6px;transition:all .15s;flex:1;}
.kanban-drop-zone.drag-over{background:var(--acc-dim);outline:2px dashed var(--acc);outline-offset:-2px;}

/* ══ LINE STATE ══ */
.line-state-label{font-size:9px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-right:3px;flex-shrink:0;}
.line-state-btns{display:flex;gap:3px;margin-top:6px;align-items:center;}
.line-state-btn{flex:1;padding:4px 6px;border:1.5px solid var(--border2);border-radius:20px;background:transparent;font-size:10px;font-weight:700;color:var(--t3);cursor:pointer;transition:all .12s;text-align:center;min-width:0;}
.line-state-btn:hover{border-color:var(--border3);color:var(--t2);background:var(--s3);}
.line-state-btn.s-pendiente{border-color:#4d94ff;color:#4d94ff;background:rgba(77,148,255,.14);font-weight:800;}
.line-state-btn.s-en_proceso{border-color:#ffb020;color:#ffb020;background:rgba(255,176,32,.1);}
.line-state-btn.s-listo{border-color:#3ddc84;color:#3ddc84;background:rgba(61,220,132,.1);}

/* ══ LINE NOTES ══ */
.line-img{width:48px;height:48px;object-fit:cover;border-radius:5px;border:1px solid var(--border2);cursor:pointer;flex-shrink:0;}
.line-img-placeholder{width:48px;height:48px;border:1.5px dashed var(--border2);border-radius:5px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t3);font-size:18px;flex-shrink:0;transition:border-color .1s;}
.line-img-placeholder:hover{border-color:var(--border3);color:var(--t2);}
.line-notes-toggle{background:none;border:none;font-size:10px;color:var(--t3);cursor:pointer;padding:3px 0 0;transition:color .1s;}
.line-notes-toggle:hover{color:var(--t2);}
.line-notes-area{margin-top:5px;width:100%;background:var(--s3);border:1px solid var(--border2);border-radius:4px;color:var(--t1);font-size:11px;padding:5px 7px;outline:none;resize:none;font-family:inherit;line-height:1.4;display:block;}

/* ══ PRICE HISTORY ══ */
.hist-wrap{position:relative;}
.hist-dot{width:16px;height:16px;background:none;border:none;color:var(--t3);font-size:12px;cursor:pointer;transition:color .1s;padding:0;}
.hist-dot:hover{color:var(--t2);}
.price-hist{position:absolute;bottom:calc(100% + 4px);right:0;background:var(--s4);border:1px solid var(--border3);border-radius:8px;padding:8px 10px;min-width:200px;box-shadow:var(--shadow2);z-index:200;display:none;}
.price-hist.open{display:block;}
.price-hist-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--t3);margin-bottom:6px;}
.price-hist-row{display:flex;justify-content:space-between;gap:12px;font-size:11px;padding:3px 0;border-bottom:1px solid var(--border);color:var(--t2);}
.price-hist-row:last-child{border-bottom:none;}
.price-hist-row strong{color:var(--t1);font-family:'DM Mono',monospace;}

/* ══ PRINT ══ */
@media print{
  #rail,#toast,.back-btn,.of-head .btn-ghost,.mul-btns,.line-state-btns,
  .line-notes-toggle,.pay-panel,.newline-row,.order-actions,.iva-btn,
  .disc-inp,.btn-icon,.hist-dot{display:none!important;}
  #main{overflow:visible!important;}
  body,html{overflow:auto!important;height:auto!important;}
  .of-wrap{max-width:100%!important;padding:20px!important;}
  .print-header{display:flex!important;align-items:flex-start;justify-content:space-between;margin-bottom:20px;padding-bottom:16px;border-bottom:2px solid #000;}
  .line-card{break-inside:avoid;border:1px solid #ddd!important;background:#fff!important;color:#000!important;}
  .line-cat-badge,.lf-computed{display:none!important;}
  .totals-panel{border:1px solid #ddd!important;background:#fff!important;color:#000!important;}
}
.print-header{display:none;}

/* ══ SETTINGS EXTRAS ══ */
.theme-btns{display:flex;gap:6px;}
.theme-btn{flex:1;padding:8px;border:1px solid var(--border2);border-radius:6px;background:transparent;cursor:pointer;font-size:11px;font-weight:600;color:var(--t2);transition:all .1s;text-align:center;}
.theme-btn.on{border-color:var(--acc);color:var(--acc);background:var(--acc-dim);}
.accent-swatches{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .1s,transform .1s;}
.swatch.on{border-color:var(--t1);transform:scale(1.15);}
.logo-preview{width:48px;height:48px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;overflow:hidden;margin-right:10px;}
.logo-preview img{width:100%;height:100%;object-fit:cover;}

/* ══ TOAST ══ */

#main::-webkit-scrollbar{width:4px;}
#main::-webkit-scrollbar-track{background:transparent;}

/* ── Lock screen ── */

.pin-dots{display:flex;gap:10px;justify-content:center;margin-bottom:18px;}
.pin-dot{width:13px;height:13px;border-radius:50%;border:2px solid var(--border3);transition:all .15s;}
.pin-dot.filled{background:var(--c1);border-color:var(--c1);}
.pin-dot.error{background:var(--red);border-color:var(--red);animation:shake .3s;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.pin-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:210px;margin:0 auto 12px;}
.pin-key{height:50px;background:var(--s2);border:1px solid var(--border2);border-radius:10px;font-size:17px;font-weight:600;color:var(--t1);cursor:pointer;transition:all .1s;display:flex;align-items:center;justify-content:center;}

// ── SHA-256 (puro JS, sin dependencias) ──
async function sha256(str){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// ── Estado del PIN ──
let _pinBuffer='';
const PIN_LENGTH=4;
const PIN_KEY='craftcrm_pin_hash';

function isPinSet(){ return !!localStorage.getItem(PIN_KEY); }
function getPinHash(){ return localStorage.getItem(PIN_KEY)||''; }

// ── Mostrar/ocultar lock screen ──
function showLockScreen(){
  _pinBuffer='';
  const ls=document.getElementById('lock-screen');
  if(!ls) return;
  // Update brand name
  const lb=document.getElementById('lock-brand');
  if(lb) lb.textContent=BRAND.name||'CraftCRM';
  ls.style.display='flex';
  updatePinDots();
}
function hideLockScreen(){
  const ls=document.getElementById('lock-screen');
  if(ls) ls.style.display='none';
  _pinBuffer='';
}

// ── Teclado PIN ──
function pinKey(digit){
  if(_pinBuffer.length>=PIN_LENGTH) return;
  _pinBuffer+=digit;
  updatePinDots();
  if(_pinBuffer.length===PIN_LENGTH){
    verifyPin(_pinBuffer);
  }
}
function pinDel(){
  _pinBuffer=_pinBuffer.slice(0,-1);
  updatePinDots();
}
function updatePinDots(){
  for(let i=0;i<PIN_LENGTH;i++){
    const d=document.getElementById('pd'+i);
    if(d){
      d.classList.toggle('filled',i<_pinBuffer.length);
      d.classList.remove('error');
    }
  }
}
async function verifyPin(pin){
  const hash=await sha256(pin);
  if(hash===getPinHash()){
    hideLockScreen();
    // Save session token so we don't ask again in same tab
    sessionStorage.setItem('craftcrm_unlocked','1');
  } else {
    // Show error shake
    for(let i=0;i<PIN_LENGTH;i++){
      const d=document.getElementById('pd'+i);
      if(d){d.classList.add('error');d.classList.remove('filled');}
    }
    const msg=document.getElementById('lock-msg');
    if(msg) msg.textContent='PIN incorrecto';
    setTimeout(()=>{
      _pinBuffer='';
      updatePinDots();
      const msg=document.getElementById('lock-msg');
      if(msg) msg.textContent='';
    },900);
  }
}

// ── Keyboard support on lock screen ──
document.addEventListener('keydown',e=>{
  const ls=document.getElementById('lock-screen');
  if(!ls||ls.style.display==='none') return;
  if(e.key>='0'&&e.key<='9') pinKey(e.key);
  else if(e.key==='Backspace') pinDel();
  else if(e.key==='Enter'&&_pinBuffer.length===PIN_LENGTH) verifyPin(_pinBuffer);
});

// ── Set/change PIN ──
async function setPIN(newPin, oldPin=''){
  if(isPinSet()&&oldPin){
    const oldHash=await sha256(oldPin);
    if(oldHash!==getPinHash()){toast('PIN actual incorrecto');return false;}
  }
  if(newPin){
    const hash=await sha256(newPin);
    localStorage.setItem(PIN_KEY,hash);
    sessionStorage.setItem('craftcrm_unlocked','1');
    toast('PIN configurado ✓');
  } else {
    localStorage.removeItem(PIN_KEY);
    toast('PIN eliminado — acceso sin restricciones');
  }
  return true;
}
function removePIN(){ localStorage.removeItem(PIN_KEY); }

// ── Check lock on app start ──
function checkLock(){
  if(!isPinSet()) return; // No PIN set → open
  if(sessionStorage.getItem('craftcrm_unlocked')==='1') return; // Same tab session
  showLockScreen();
}

// ── Auto-lock after inactivity (10 min) ──
let _lockTimer=null;
const LOCK_TIMEOUT=10*60*1000; // 10 minutes
function resetLockTimer(){
  if(!isPinSet()) return;
  clearTimeout(_lockTimer);
  _lockTimer=setTimeout(()=>{
    sessionStorage.removeItem('craftcrm_unlocked');
    showLockScreen();
  },LOCK_TIMEOUT);
}
['click','keydown','touchstart'].forEach(ev=>
  document.addEventListener(ev,resetLockTimer,{passive:true})
);

// Returns the visual color for an order based on status + payment state
function _isLightTheme() {
  return document.documentElement.getAttribute('data-theme') === 'slate';

  cotizacion:'#2563eb', confirmada:'#ea580c', en_produccion:'#7c3aed',
  lista:'#16a34a', entregada:'#166534', cancelada:'#dc2626'
};
function getOrderColor(o) {
  if (!o) return '#555';
  const light = _isLightTheme();
  if (o.status === 'cancelada') return light ? '#dc2626' : '#ff4545';
  if (o.status === 'entregada') {
    const total = parseFloat(o.total || 0);
    const pagado = parseFloat(o.pagado || 0);
    const isPaid = total > 0 && pagado >= total - 0.01;
    return isPaid ? (light ? '#166534' : '#1a5c32') : (light ? '#16a34a' : '#3ddc84');
  }
  return (light ? SC_LIGHT : SC)[o.status] || (light ? SC_HEX[o.status] : '#555') || '#555';
}

// Returns a label that reflects payment status for delivered orders
function getOrderLabel(o) {
  if (!o) return '';
  if (o.status === 'entregada') {
    const total = parseFloat(o.total || 0);
    const pagado = parseFloat(o.pagado || 0);
    const isPaid = total > 0 && pagado >= total - 0.01;
    return isPaid ? 'Entregada · Pagada' : 'Entregada · Pend. cobro';
  }
  return SL[o.status] || o.status;
}

//  AUTO-CATEGORIZATION RULES ENGINE
// ════════════════════════════════════════════════════════
const RULES_KEY = 'craftcrm_auto_rules';

function loadAutoRules() {
  try { return JSON.parse(localStorage.getItem(RULES_KEY)||'[]'); } catch(e) { return []; }
}
function saveAutoRules(rules) { localStorage.setItem(RULES_KEY, JSON.stringify(rules)); }

function addAutoRule() {
  const rules = loadAutoRules();
  rules.push({ keyword: '', category: USER_CATS[0]?.name||'general' });
  saveAutoRules(rules);
  renderSettings('reglas');
}
function updateAutoRule(i, field, value) {
  const rules = loadAutoRules();
  if(rules[i]) { rules[i][field] = value; saveAutoRules(rules); }
}
function deleteAutoRule(i) {
  const rules = loadAutoRules();
  rules.splice(i, 1);
  saveAutoRules(rules);
}

// Returns the matching category name or null
function applyAutoRules(productName) {
  const rules = loadAutoRules();
  const name = (productName||'').toLowerCase();
  for(const r of rules) {
    if(r.keyword && name.includes(r.keyword.toLowerCase())) return r.category;
  }
  return null;
}

function testAutoRules() {
  const inp = document.getElementById('rule-test-inp');
  const result = document.getElementById('rule-test-result');
  if(!inp||!result) return;
  const name = inp.value.trim();
  if(!name) { result.textContent = 'Escribe un nombre para probar'; result.style.color='var(--t3)'; return; }
  const cat = applyAutoRules(name);
  if(cat) {
    result.innerHTML = `✓ Coincide → <strong style="color:var(--acc)">${esc(cat)}</strong>`;
    result.style.color = 'var(--c2)';
  } else {
    result.textContent = '— Sin coincidencia, no se cambiaría la categoría';
    result.style.color = 'var(--t3)';
  }
}

async function applyAllAutoRules() {
  const rules = loadAutoRules();
  if(!rules.length) { toast('Sin reglas configuradas'); return; }
  let changed = 0;
  for(const p of DATA.productos) {
    const newCat = applyAutoRules(p.nombre);
    if(newCat && newCat !== p.categoria) {
      try {
        await sb('productos', `id=eq.${p.id}`, 'PATCH', { categoria: newCat });
        p.categoria = newCat;
        changed++;
      } catch(e) {}
    }
  }
  toast(`✓ ${changed} producto${changed!==1?'s':''} re-categorizados`);
  renderSettings('reglas');
}

// ── SUPABASE ──
async function sb(table,params='',method='GET',body=null){
  const h={apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`,'Content-Type':'application/json'};
  if(method==='POST'||method==='PATCH')h['Prefer']='return=representation';
  const r=await fetch(`${SB_URL}/rest/v1/${table}?${params}`,{method,headers:h,body:body?JSON.stringify(body):null});
  if(!r.ok){const e=await r.text().catch(()=>'');throw new Error(`${table} ${r.status}: ${e}`);}
  const t=await r.text();return t?JSON.parse(t):null;
}

async function loadAll(){
  try{
    const[p,c,o,s]=await Promise.all([
      sb('productos','select=*&order=nombre'),
      sb('clientes','select=*&order=nombre'),
      sb('ordenes','select=*&order=created_at.desc'),
      sb('proveedores','select=*&order=nombre'),
    ]);
    DATA.productos=p||[];DATA.clientes=c||[];DATA.ordenes=o||[];DATA.proveedores=s||[];
    sbConn=true;$('conn-dot').classList.add('ok');$('conn-dot').title='Conectado';
    await loadConfigFromSupabase();
    // Pre-load product names for all active orders so dashboard shows them immediately
    _loadActiveOrderLines();
  }catch(e){sbConn=false;$('conn-dot').classList.remove('ok');}
}

function _loadActiveOrderLines(){
  const activeOrds = DATA.ordenes.filter(o=>!['entregada','cancelada'].includes(o.status));
  // Batch: load lines for up to 40 active orders in parallel, quietly
  Promise.all(activeOrds.slice(0,40).map(async o=>{
    if(_prodCache[o.id]) return; // already cached
    try{
      const lines = await sb('orden_lineas',`select=producto_nombre&orden_id=eq.${o.id}&order=created_at`);
      cacheOrderLines(o.id, lines||[]);
    }catch(e){}
  })).then(()=>{
    // Silently refresh dashboard if it's currently visible
    if(curPage==='dashboard') renderDashboard();
  });
}

async function connectSb(){
  try{
    const r=await fetch(`${SB_URL}/rest/v1/configuracion?select=clave&limit=1`,
      {headers:{apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`}});
    if(!r.ok)throw new Error(r.status);
    sbConn=true;$('conn-dot').classList.add('ok');
    await loadAll();toast('Conectado ✓');navigate(curPage);
  }catch(e){sbConn=false;renderSetup(e.message);}
}

  const sel=document.querySelector(`#list-panel .lp-item[onclick*="${id}"]`);
  if(sel)sel.classList.add('selected');
  await openEditOrder(id);
  const o=DATA.ordenes.find(x=>x.id===id);
  if(o){
    const sc=getOrderColor(o);
    ctxSet('Órdenes',o.numero||id.slice(0,8).toUpperCase(),sc,getOrderLabel(o),
      `<button class="btn btn-acc" onclick="saveOrder()" style="font-size:11px;padding:5px 12px">Guardar</button>`);
    const cl=DATA.clientes.find(c=>c.id===o.cliente_id);
    dpShow(buildClientDP(cl,id));
  }
}

function openNewOrder(){
  OF={id:null,numero:'',cliente_id:null,cliente_nombre:'',status:'cotizacion',
    fecha_entrega:defaultDelivery(),notas:'',moneda:DEFAULT_MONEDA,descuento_pct:0,iva:true,
    cargos_override:{},total_guardado:0,lines:[],pagos:[],pagado:0};
  renderOrderForm();

async function openEditOrder(id){
  const ord=DATA.ordenes.find(o=>o.id===id);if(!ord)return;
  const cl=DATA.clientes.find(c=>c.id===ord.cliente_id);
  let lines=[],pagos=[];
  try{lines=await sb('orden_lineas',`select=*&orden_id=eq.${id}&order=created_at`)||[];cacheOrderLines(id,lines);}catch(e){}
  try{pagos=await sb('orden_pagos',`select=*&orden_id=eq.${id}&order=created_at`)||[];}catch(e){}
  let imagenes=[];
  let cargos_override={};
  try{
    const imgRaw=ord.imagenes_json;
    if(imgRaw){
      const parsed=typeof imgRaw==='string'?JSON.parse(imgRaw):imgRaw;
      // Support both old format (array) and new format {imgs:[], co:{}}
      if(Array.isArray(parsed)) imagenes=parsed;
      else { imagenes=parsed.imgs||[]; cargos_override=parsed.co||{}; }
    }
  }catch(e){}
  OF={id,numero:ord.numero||'',cliente_id:ord.cliente_id||null,cliente_nombre:cl?.nombre||'',
    status:ord.status||'cotizacion',fecha_entrega:ord.fecha_entrega||defaultDelivery(),
    notas:ord.notas||'',moneda:DEFAULT_MONEDA,descuento_pct:parseFloat(ord.descuento_pct)||0,
    iva:ord.iva!==false,
    cargos_override, // per-cargo toggle loaded from DB
    lines: hydrateLines(lines),
    pagos:pagos.map(p=>({id:p.id,monto:parseFloat(p.monto)||0,metodo:p.metodo||'efectivo',fecha:p.fecha||'',nota:p.nota||''})),
    pagado:parseFloat(ord.pagado||0),
    total_guardado:parseFloat(ord.total||0), // saved total from DB — used for paid check
    imagenes};
  renderOrderForm();
}

// ── CLIENT AUTOCOMPLETE ──
let _acClientIdx=-1;
function onClientInput(val){
  OF.cliente_nombre=val;_acClientIdx=-1;
  const drop=$('client-drop');
  if(!val.trim()){drop.classList.remove('open');drop.innerHTML='';drop._m=[];return;}
  const q=val.trim().toLowerCase();
  const m=DATA.clientes.filter(c=>(c.nombre||'').toLowerCase().includes(q)||(c.empresa||'').toLowerCase().includes(q)).slice(0,8);
  let html=m.length
    ?m.map((c,i)=>`<div class="ac-item" id="ci-${i}" onclick="selectClient('${c.id}','${esc(c.nombre)}')" onmouseenter="_acClientIdx=${i};hiClientDrop()">
        <div><div class="ac-item-name">${esc(c.nombre)}</div>${c.empresa?`<div class="ac-item-sub">${esc(c.empresa)}</div>`:''}</div>
        ${c.telefono?`<span class="ac-badge">${esc(c.telefono)}</span>`:''}
      </div>`).join('')
    :`<div class="ac-hint">Sin resultados — presiona Enter para crear</div>`;
  html+=`<div class="ac-new" id="ci-new" onclick="createClientInline('${esc(val)}')" onmouseenter="_acClientIdx=${m.length};hiClientDrop()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="12" height="12"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Crear <strong style="margin-left:2px">"${esc(val)}"</strong>
  </div>`;
  drop.innerHTML=html;drop._m=m;drop.classList.add('open');
}
function onClientKey(e){
  const drop=$('client-drop');const m=drop._m||[];
  if(e.key==='ArrowDown'){e.preventDefault();_acClientIdx=Math.min(_acClientIdx+1,m.length);hiClientDrop();}
  else if(e.key==='ArrowUp'){e.preventDefault();_acClientIdx=Math.max(_acClientIdx-1,-1);hiClientDrop();}
  else if(e.key==='Enter'){
    e.preventDefault();
    if(_acClientIdx>=0&&_acClientIdx<m.length)selectClient(m[_acClientIdx].id,m[_acClientIdx].nombre);
    else if(m.length===1&&_acClientIdx<0)selectClient(m[0].id,m[0].nombre);
    else createClientInline(OF.cliente_nombre.trim());
  }
  else if(e.key==='Tab'){if(m.length===1){e.preventDefault();selectClient(m[0].id,m[0].nombre);}else{e.preventDefault();createClientInline(OF.cliente_nombre.trim()||'Cliente nuevo');}}
  else if(e.key==='Escape'){drop.classList.remove('open');_acClientIdx=-1;}
}
function hiClientDrop(){
  const drop=$('client-drop');const m=drop._m||[];
  drop.querySelectorAll('.ac-item').forEach((el,i)=>el.classList.toggle('hi',i===_acClientIdx));
  $('ci-new')?.classList.toggle('hi',_acClientIdx===m.length);
}

// ── MINI CALENDAR DATE PICKER ──
function buildDateDisplay(){
  const dStr=OF.fecha_entrega||defaultDelivery();
  const d=new Date(dStr+'T12:00:00');
  const today=new Date();today.setHours(0,0,0,0);
  const diff=Math.round((d-today)/86400000);
  const hint=diff===0?'Hoy':diff===1?'Mañana':diff>0?`en ${diff} días`:diff===-1?'Ayer':`hace ${-diff} días`;
  return`<div class="date-display" onclick="toggleMiniCal()" id="date-display">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    <span class="date-val">${fmtDateES(dStr)}</span>
    <span class="date-hint">${hint}</span>
  </div>`;
}

function toggleMiniCal(){
  const cal=$('mini-cal');
  if(!cal)return;
  const isOpen=cal.classList.contains('open');
  document.querySelectorAll('.mini-cal.open').forEach(c=>c.classList.remove('open'));
  if(!isOpen){cal.innerHTML=buildMiniCal();cal.classList.add('open');}
}

function buildMiniCal(){
  const months=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const today=new Date();const todayStr=isoDate(today);
  const selected=OF.fecha_entrega||defaultDelivery();
  const year=_calYear, month=_calMonth;
  const first=new Date(year,month,1);
  const startDow=(first.getDay()+6)%7; // Mon start
  const daysInMonth=new Date(year,month+1,0).getDate();

  // Count deliveries per day
  const delivCounts={};
  DATA.ordenes.forEach(o=>{if(o.fecha_entrega&&!['entregada','cancelada'].includes(o.status))delivCounts[o.fecha_entrega]=(delivCounts[o.fecha_entrega]||0)+1;});

  let days='';
  for(let i=0;i<startDow;i++)days+=`<div class="mc-day other-month"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const cnt=delivCounts[ds]||0;
    const isSel=ds===selected;const isToday=ds===todayStr;
    const dotColor=cnt===0?'':cnt<=1?'low':cnt<=3?'med':'high';
    const dot=cnt>0?`<div class="mc-dots"><div class="mc-dot ${dotColor}"></div>${cnt>3?`<div class="mc-dot high"></div>`:''}</div>`:'';
    days+=`<div class="mc-day${isSel?' sel':''}${isToday&&!isSel?' today':''}" onclick="pickDate('${ds}')" title="${cnt>0?cnt+' entregas':''}">${d}${dot}</div>`;
  }

  return`<div class="mc-head">
    <button class="mc-nav" onclick="event.stopPropagation();_calMonth--;if(_calMonth<0){_calMonth=11;_calYear--;} $('mini-cal').innerHTML=buildMiniCal()">‹</button>
    <span class="mc-month">${months[month]} ${year}</span>
    <button class="mc-nav" onclick="event.stopPropagation();_calMonth++;if(_calMonth>11){_calMonth=0;_calYear++;} $('mini-cal').innerHTML=buildMiniCal()">›</button>
  </div>
  <div class="mc-dow">${['L','M','X','J','V','S','D'].map(d=>`<span>${d}</span>`).join('')}</div>
  <div class="mc-days">${days}</div>
  <div style="display:flex;gap:4px;padding-top:8px;border-top:1px solid var(--border);margin-top:6px">
    <button class="btn btn-ghost" style="flex:1;font-size:10px;padding:4px" onclick="pickDate('${todayStr}')">Hoy</button>
    <button class="btn btn-ghost" style="flex:1;font-size:10px;padding:4px" onclick="pickDate('${defaultDelivery()}')">+3 días</button>
    <button class="btn btn-ghost" style="flex:1;font-size:10px;padding:4px" onclick="pickDateOffset(7)">+7 días</button>
  </div>`;
}

function pickDate(ds){
  OF.fecha_entrega=ds;
  $('mini-cal')?.classList.remove('open');
  const ddWrap=$('dpw');if(ddWrap){const dd=ddWrap.querySelector('.date-display');if(dd)dd.outerHTML=buildDateDisplay();}
  // Rerender date display area
  const dd=$('date-display');if(dd)dd.outerHTML=buildDateDisplay();
  // Rebuild entire date display
  const dpw=$('dpw');
  if(dpw)dpw.innerHTML=buildDateDisplay()+`<div class="mini-cal" id="mini-cal"></div>`;
}
function pickDateOffset(days){const d=new Date();d.setDate(d.getDate()+days);pickDate(isoDate(d));}

// Close mini cal on outside click
document.addEventListener('click',e=>{
  if(!e.target.closest('.date-picker-wrap'))document.querySelectorAll('.mini-cal.open').forEach(c=>c.classList.remove('open'));
  if(!e.target.closest('.ac-wrap')&&!e.target.closest('.newline-row'))document.querySelectorAll('.ac-drop').forEach(d=>d.classList.remove('open'));
});

// ══════════════════════════════════════════════════════════════
//  LINE STRATEGY SYSTEM — Polymorphic multiplier engine
//
//  Each line is a plain object. Strategy functions are looked up
//  by line.multiplier and called with the line as argument.
//  This is the OOP Strategy Pattern in plain JS.
//
//  Strategies: standard | dimensional | peso_vol | tiers
// ══════════════════════════════════════════════════════════════

// ── Strategy registry ──
const LINE_STRATEGIES = {

  // ── Standard: qty × price ──────────────────────────────────
  standard: {
    label: 'Estándar',
    icon: '×',
    // Create a fresh line with this strategy
    create(prod) {
      return {
        multiplier: 'standard',
        prod_id: prod?.id || null,
        prod_nombre: prod?.nombre || '',
        categoria: prod?.categoria || '',
        qty: 1,
        price: parseFloat(prod?.precio_base) || 0,
        precio_manual: null,
        subtotal: parseFloat(prod?.precio_base) || 0,
        status_linea: 'pendiente',
        notas_linea: '',
        _notesOpen: false,
      };
    },
    // Render the input fields for this strategy inside a line card
    renderFields(l, i) {
      return `
        <div class="lf-group">
          <div class="lf-label">Cant.</div>
          <input class="lf-inp" type="number" min="0.01" step="any" value="${l.qty}"
            oninput="LF.set(${i},'qty',parseFloat(this.value)||1)">
        </div>
        <div class="lf-group">
          <div class="lf-label">Precio u.</div>
          <input class="lf-inp" type="number" min="0" step="any" value="${l.price}"
            oninput="LF.set(${i},'price',parseFloat(this.value)||0)">
        </div>`;
    },
  },

  // ── Dimensional: qty × ancho × alto × precio/unidad² ───────
  dimensional: {
    label: 'Dimensional',
    icon: '⊡',
    create(prod) {
      return {
        multiplier: 'dimensional',
        prod_id: prod?.id || null,
        prod_nombre: prod?.nombre || '',
        categoria: prod?.categoria || '',
        qty: 1,
        ancho: 1, alto: 1,
        unidad_dim: prod?._catCfg?.unit || 'm',
        price: parseFloat(prod?.precio_base) || 0,  // price per unit²
        precio_manual: null,
        subtotal: 0,
        status_linea: 'pendiente',
        notas_linea: '',
        _notesOpen: false,
      };
    },
    calcSubtotal(l) {
      if (l.precio_manual !== null) return parseFloat(l.precio_manual);
      const area = (parseFloat(l.ancho) || 0) * (parseFloat(l.alto) || 0);
      return (parseFloat(l.qty) || 1) * area * (parseFloat(l.price) || 0);
    },
    renderFields(l, i) {
      const units = ['cm','m','ft','in','mm'];
      const area = ((parseFloat(l.ancho)||0)*(parseFloat(l.alto)||0)).toFixed(2);
      return `
        <div class="lf-group" style="min-width:52px">
          <div class="lf-label">Unidad</div>
          <select class="lf-inp" style="padding:3px 4px" onchange="LF.set(${i},'unidad_dim',this.value)">
            ${units.map(u=>`<option value="${u}"${l.unidad_dim===u?' selected':''}>${u}</option>`).join('')}
          </select>
        </div>
        <div class="lf-group">
          <div class="lf-label">Cant.</div>
          <input class="lf-inp" type="number" min="1" step="1" value="${l.qty}"
            oninput="LF.set(${i},'qty',parseFloat(this.value)||1)">
        </div>
        <div class="lf-group">
          <div class="lf-label">Ancho (${l.unidad_dim})</div>
          <input class="lf-inp" type="number" min="0" step="any" value="${l.ancho}"
            oninput="LF.set(${i},'ancho',parseFloat(this.value)||0)">
        </div>
        <div class="lf-group">
          <div class="lf-label">Alto (${l.unidad_dim})</div>
          <input class="lf-inp" type="number" min="0" step="any" value="${l.alto}"
            oninput="LF.set(${i},'alto',parseFloat(this.value)||0)">
        </div>
        <div class="lf-group">
          <div class="lf-label">Costo/${l.unidad_dim}²</div>
          <input class="lf-inp" type="number" min="0" step="any" value="${l.price}"
            oninput="LF.set(${i},'price',parseFloat(this.value)||0)">
        </div>
        <div class="lf-group" style="min-width:68px;max-width:80px">
          <div class="lf-label" style="color:var(--c2)">= Área</div>
          <div class="lf-inp" style="background:var(--s2);color:var(--c2);font-weight:700;font-size:11px">${area}${l.unidad_dim}²</div>
        </div>`;
    },
  },

  // ── Peso/Volumen: qty × medida × precio/unidad ──────────────
  peso_vol: {
    label: 'Peso/Vol',
    icon: '⚖',
    create(prod) {
      const cfg = prod?._catCfg || {};
      return {
        multiplier: 'peso_vol',
        prod_id: prod?.id || null,
        prod_nombre: prod?.nombre || '',
        categoria: prod?.categoria || '',
        qty: 1,
        medida: 1,
        unidad_medida: cfg.unit || 'kg',
        price: parseFloat(prod?.precio_base) || 0,
        precio_manual: null,
        subtotal: 0,
        status_linea: 'pendiente',
        notas_linea: '',
        _notesOpen: false,
      };
    },
    calcSubtotal(l) {
      if (l.precio_manual !== null) return parseFloat(l.precio_manual);
      return (parseFloat(l.qty)||1) * (parseFloat(l.medida)||0) * (parseFloat(l.price)||0);
    },
    renderFields(l, i) {
      const units = ['g','kg','t','lb','oz','ml','L','m³','gal','fl_oz'];
      return `
        <div class="lf-group">
          <div class="lf-label">Cant.</div>
          <input class="lf-inp" type="number" min="1" step="1" value="${l.qty}"
            oninput="LF.set(${i},'qty',parseFloat(this.value)||1)">
        </div>
        <div class="lf-group">
          <div class="lf-label">Medida</div>
          <input class="lf-inp" type="number" min="0" step="any" value="${l.medida}"
            oninput="LF.set(${i},'medida',parseFloat(this.value)||0)">
        </div>
        <div class="lf-group" style="min-width:60px">
          <div class="lf-label">Unidad</div>
          <select class="lf-inp" style="padding:3px 4px"
            onchange="LF.set(${i},'unidad_medida',this.value)">
            ${units.map(u=>`<option value="${u}"${l.unidad_medida===u?' selected':''}>${u}</option>`).join('')}
          </select>
        </div>
        <div class="lf-group">
          <div class="lf-label">Costo por ${l.unidad_medida}</div>
          <input class="lf-inp" type="number" min="0" step="any" value="${l.price}"
            oninput="LF.set(${i},'price',parseFloat(this.value)||0)">
        </div>`;
    },
  },

  // ── Tiers: pick from discrete quantity/price table ──────────
  tiers: {
    label: 'Tiers',
    icon: '≡',
    create(prod) {
      const cat = USER_CATS.find(c => c.name === prod?.categoria);
      const tiers = cat?.config?.tiers || [];
      return {
        multiplier: 'tiers',
        prod_id: prod?.id || null,
        prod_nombre: prod?.nombre || '',
        categoria: prod?.categoria || '',
        qty: tiers[0]?.[0] || 1,
        price: tiers[0]?.[1] || parseFloat(prod?.precio_base) || 0,
        tier_idx: 0,
        tiers: JSON.parse(JSON.stringify(tiers)),
        precio_manual: null,
        subtotal: tiers[0]?.[1] || 0,
        status_linea: 'pendiente',
        notas_linea: '',
        _notesOpen: false,
      };
    },
    calcSubtotal(l) {
      if (l.precio_manual !== null) return parseFloat(l.precio_manual);
      if (l.tiers && l.tiers[l.tier_idx]) return parseFloat(l.tiers[l.tier_idx][1]) || 0;
      return (parseFloat(l.qty)||1) * (parseFloat(l.price)||0);
    },
    renderFields(l, i) {
      const tiers = l.tiers || [];
      if (!tiers.length) {
        return `<div class="lf-group" style="flex:2">
          <div class="lf-label" style="color:var(--amber)">Sin tiers — configura en Ajustes → Categorías</div>
          <input class="lf-inp" type="number" value="${l.qty}" oninput="LF.set(${i},'qty',parseFloat(this.value)||1)">
        </div>
        <div class="lf-group">
          <div class="lf-label">Precio</div>
          <input class="lf-inp" type="number" value="${l.price}" oninput="LF.set(${i},'price',parseFloat(this.value)||0)">
        </div>`;
      }
      return `
        <div class="lf-group" style="flex:3">
          <div class="lf-label">Cantidad / Tier</div>
          <div style="display:flex;gap:4px;flex-wrap:wrap">
            ${tiers.map((t,ti)=>`
              <button class="tier-pill${l.tier_idx===ti?' active':''}"
                onclick="LF.setTier(${i},${ti})">
                ${t[0]} u — $${fmt(t[1])}
              </button>`).join('')}
          </div>
        </div>`;
    },
  },
};

// ── Line Factory — resolves strategy from category config ──────
function LINE_FACTORY(prod) {
  // prod may be from DATA.productos — enrich with category config
  const cat = USER_CATS.find(c => c.name === prod?.categoria);
  const incType = cat?.incrementType || 'regular';
  // Map INC_TYPES id → LINE_STRATEGIES key
  const stratMap = {
    regular: 'standard',
    tiers: 'tiers',
    dimensional: 'dimensional',
    weight: 'peso_vol',
    volume: 'peso_vol',
    time: 'standard',
  };
  const stratKey = stratMap[incType] || 'standard';
  const strategy = LINE_STRATEGIES[stratKey];
  // Inject category config into prod for create()
  const enrichedProd = { ...prod, _catCfg: cat?.config || {} };
  return strategy.create(enrichedProd);
}

// ── LF — Line Field mutation controller ───────────────────────
// All field inputs call LF.set() — single point of mutation
const LF = {
  set(i, key, val) {
    const line = OF.lines[i];
    if (!line) return;
    if (key !== 'precio_manual') line.precio_manual = null;
    line[key] = val;
    const strategy = LINE_STRATEGIES[line.multiplier] || LINE_STRATEGIES.standard;
    line.subtotal = strategy.calcSubtotal ? strategy.calcSubtotal(line) : (line.qty||1)*(line.price||0);
    // Full re-render needed when unit changes (labels update) or for dimensional (area display)
    const needsFullRender = ['unidad_dim','unidad_medida'].includes(key) || line.multiplier==='dimensional';
    if(needsFullRender){
      renderLinesList();
    } else {
      LF._refreshLineSubtotal(i);
    }
    const tot = calcTotals();
    const tp = $('totals-panel');
    if(tp) tp.innerHTML = buildTotalsHTML(tot);
    const pp = $('pay-panel');
    if(pp) {
      pp.innerHTML = buildPayHTML(tot.total);
      if(_payOpen){const pb=$('pay-body');const pc=$('pay-chev');if(pb)pb.style.display='block';if(pc)pc.style.transform='rotate(180deg)';}
    }
  },
  setManual(i, val) {
    const line = OF.lines[i];
    if (!line) return;
    line.precio_manual = val === '' ? null : parseFloat(val) || 0;
    line.subtotal = val === '' 
      ? ((LINE_STRATEGIES[line.multiplier]||LINE_STRATEGIES.standard).calcSubtotal?.(line) ?? (parseFloat(line.qty)||1)*(parseFloat(line.price)||0))
      : parseFloat(val) || 0;
    LF._refreshLineSubtotal(i);
    refreshTotals();
  },
  setTier(i, tierIdx) {
    const line = OF.lines[i];
    if (!line || !line.tiers) return;
    line.tier_idx = tierIdx;
    line.qty = line.tiers[tierIdx]?.[0] || 1;
    line.price = line.tiers[tierIdx]?.[1] || 0;
    line.precio_manual = null;
    line.subtotal = LINE_STRATEGIES.tiers.calcSubtotal(line);
    // Full line re-render needed (pills need to update active state)
    renderLinesList();
    refreshTotals();
  },
  setState(i, status) {
    const line = OF.lines[i];
    if (!line) return;
    line.status_linea = status;
    // Re-render just this line card
    const el = document.getElementById(`lc-${i}`);
    if (el) el.outerHTML = buildLine(line, i);
  },
  setNote(i, val) {
    const line = OF.lines[i];
    if (!line) return;
    line.notas_linea = val;
  },
  toggleNotes(i) {
    const line = OF.lines[i];
    if (!line) return;
    line._notesOpen = !line._notesOpen;
    const el = document.getElementById(`lc-${i}`);
    if (el) el.outerHTML = buildLine(line, i);
  },
  toggleHist(i) {
    const histEl = document.getElementById(`hist-${i}`);
    if (histEl) histEl.classList.toggle('open');
  },
  switchMultiplier(i, newKey) {
    const line = OF.lines[i];
    if (!line) return;
    const strategy = LINE_STRATEGIES[newKey];
    if (!strategy) return;
    // Preserve identity, rebuild strategy-specific fields
    const rebuilt = strategy.create({
      id: line.prod_id,
      nombre: line.prod_nombre,
      categoria: line.categoria,
      precio_base: line.price,
      _catCfg: USER_CATS.find(c => c.name === line.categoria)?.config || {},
    });
    OF.lines[i] = { ...rebuilt, prod_id: line.prod_id, prod_nombre: line.prod_nombre };
    renderLinesList();
    refreshTotals();
  },
  _refreshLineSubtotal(i) {
    const line = OF.lines[i];
    if(!line) return;
    const el = document.getElementById('lsub-'+i);
    if (el && document.activeElement !== el) {
      el.value = fmt(line.precio_manual !== null ? line.precio_manual : line.subtotal);
      el.style.color = line.precio_manual !== null ? 'var(--amber)' : 'var(--t1)';
    }
  },
};

// ── Render a single line card ──────────────────────────────────
function buildLine(l, i) {
  const strategy = LINE_STRATEGIES[l.multiplier] || LINE_STRATEGIES.standard; // safe
  const multiplierBtns = Object.entries(LINE_STRATEGIES).map(([key, s]) => `
    <button class="mul-btn${l.multiplier===key?' on':''}"
      onclick="LF.switchMultiplier(${i},'${key}')"
      title="${s.label}">${s.icon}</button>`).join('');

  // Line state
  const lineState = l.status_linea || 'pendiente';
  const stateLabels = {pendiente:'Pendiente', en_proceso:'En proceso', listo:'Listo'};
  const stateBtns = Object.keys(stateLabels).map(s =>
    `<button class="line-state-btn${lineState===s?' s-'+s:''}"
      onclick="LF.setState(${i},'${s}')">${stateLabels[s]}</button>`).join('');

  // Notes
  const hasNotes = !!(l.notas_linea || '').trim();
  const notesSection = `
    <button class="line-notes-toggle" onclick="LF.toggleNotes(${i})">
      ${hasNotes ? '📝 '+esc(l.notas_linea.slice(0,30))+(l.notas_linea.length>30?'…':'') : '+ Nota'}
    </button>
    ${hasNotes || l._notesOpen ? `<textarea class="line-notes-area" rows="2"
      placeholder="Instrucciones específicas de esta línea..."
      oninput="LF.setNote(${i},this.value)">${esc(l.notas_linea||'')}</textarea>` : ''}`;

  // Price history indicator
  const histKey = `ph_${l.prod_id}`;
  const hist = l.prod_id ? getPriceHistory(l.prod_id) : [];
  const histHtml = hist.length ? `
    <div class="hist-wrap">
      <button class="hist-dot" onclick="LF.toggleHist(${i})" title="Historial de precios">⏱</button>
      <div class="price-hist" id="hist-${i}">
        <div class="price-hist-title">Últimas ventas — ${esc(l.prod_nombre)}</div>
        ${hist.map(h=>`<div class="price-hist-row">
          <span>${esc(h.cliente)}</span>
          <span><strong>$${fmt(h.precio)}</strong></span>
          <span>${esc(h.fecha)}</span>
        </div>`).join('')}
      </div>
    </div>` : '';

  // Image
  const imgHtml = l.img_url
    ? `<img class="line-img" src="${l.img_url}" onclick="showLineImageModal(${i})" alt="img" onerror="this.style.display='none'">`
    : `<div class="line-img-placeholder" onclick="showLineImageModal(${i})" title="Agregar imagen">📷</div>`;

  return `<div class="line-card" id="lc-${i}">
    <div class="line-card-top">
      ${imgHtml}
      <div class="line-card-info">
        <div class="line-name">${esc(l.prod_nombre || 'Producto')}${histHtml}</div>
        ${l.categoria ? `<span class="line-cat-badge">${esc(l.categoria)}</span>` : ''}
      </div>
      <div class="mul-btns">${multiplierBtns}</div>
      <button class="btn-icon del" onclick="remLine(${i})" title="Quitar línea">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="line-card-fields">
      ${strategy.renderFields(l, i)}
      <div class="lf-group lf-override">
        <div class="lf-label" style="color:${l.precio_manual!==null?'var(--amber)':'var(--t3)'}">
          ${l.precio_manual !== null ? '✎ Ajustado' : 'Total'}
        </div>
        <input class="lf-inp lf-subtotal" type="number" min="0" step="any"
          id="lsub-${i}"
          value="${fmt(l.precio_manual !== null ? l.precio_manual : l.subtotal)}"
          placeholder="0.00"
          title="Edita para ajuste manual. Borra para volver automático."
          style="color:${l.precio_manual!==null?'var(--amber)':'var(--t1)'};font-weight:600"
          oninput="LF.setManual(${i},this.value)"
          onchange="if(this.value==='')LF.setManual(${i},'')">
      </div>
    </div>
    <div class="line-state-btns"><span class="line-state-label">Estado:</span>${stateBtns}</div>
    <div style="margin-top:5px">${notesSection}</div>
  </div>`;
}

// ── Price History Engine ───────────────────────────────────────
// Builds an index from DATA.ordenes → orden_lineas (already loaded as opciones_json)
// Returns last N sales of a product across all orders
let _priceHistCache = {};

function buildPriceHistoryIndex() {
  _priceHistCache = {};
  // We don't load all orden_lineas upfront, but we can use what's cached in OF.lines
  // For the autocomplete tooltip we scan DATA.ordenes for product matches in a lightweight way
  // Full index built lazily per product_id when first requested
}

function getPriceHistory(prod_id, limit = 3) {
  if (!prod_id) return [];
  // Quick scan: look through recent orders for this product in their line data
  // Since we don't preload all lines, we return cached data if available
  const cached = _priceHistCache[prod_id];
  if (cached) return cached;
  return []; // will be populated after order opens load lines
}

async function fetchPriceHistory(prod_id) {
  if (!prod_id || _priceHistCache[prod_id]) return;
  try {
    const rows = await sb('orden_lineas',
      `select=*,ordenes(numero,cliente_id,created_at,clientes(nombre))&producto_id=eq.${prod_id}&order=created_at.desc&limit=5`
    );
    if (!rows) return;
    _priceHistCache[prod_id] = rows.slice(0, 5).map(r => ({
      cliente: r.ordenes?.clientes?.nombre || '—',
      precio: parseFloat(r.precio_unitario) || 0,
      fecha: r.ordenes?.created_at ? new Date(r.ordenes.created_at).toLocaleDateString('es-MX') : '—',
      numero: r.ordenes?.numero || '—',
    }));
  } catch (e) { /* silently fail */ }
}

function renderLinesList() {
  const el = $('lines-list');
  if (el) el.innerHTML = OF.lines.map((l, i) => buildLine(l, i)).join('');
}
